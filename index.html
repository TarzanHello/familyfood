<script>
// ─── localStorage storage shim (sostituisce window.storage della Claude artifact API) ───
// Gestisce: localStorage non disponibile (Safari modalità privata),
// quota piena, e dati corrotti. Mai blocca l'app.
(function () {
  // Verifica che localStorage sia effettivamente usabile
  let lsOk = false;
  try {
    const t = "__pa_test__";
    localStorage.setItem(t, "1");
    localStorage.removeItem(t);
    lsOk = true;
  } catch (e) {
    lsOk = false;
  }

  // Fallback in memoria se localStorage non è disponibile
  const memStore = {};
  let quotaWarned = false;

  window.storage = {
    get: async (key) => {
      const v = lsOk ? localStorage.getItem("pa__" + key) : (memStore[key] ?? null);
      if (v === null || v === undefined) throw new Error("Key not found: " + key);
      return { key, value: v };
    },
    set: async (key, value) => {
      if (lsOk) {
        try {
          localStorage.setItem("pa__" + key, value);
        } catch (e) {
          // Quota superata o storage bloccato: salva in memoria e avvisa una volta
          memStore[key] = value;
          if (!quotaWarned) {
            quotaWarned = true;
            console.warn("Storage pieno o non disponibile: i dati di questa sessione non verranno salvati.");
          }
        }
      } else {
        memStore[key] = value;
      }
      return { key, value };
    },
    delete: async (key) => {
      if (lsOk) localStorage.removeItem("pa__" + key);
      delete memStore[key];
      return { key, deleted: true };
    },
    list: async (prefix = "") => {
      let keys = [];
      if (lsOk) {
        keys = Object.keys(localStorage)
          .filter(k => k.startsWith("pa__" + prefix))
          .map(k => k.slice(4));
      }
      Object.keys(memStore)
        .filter(k => k.startsWith(prefix) && !keys.includes(k))
        .forEach(k => keys.push(k));
      return { keys };
    },
    // espone lo stato per eventuali avvisi UI
    _available: lsOk,
  };
})();
</script>

// Verifica che le librerie esterne siano state caricate.
// Se i CDN falliscono e l'app non è ancora in cache, mostra un messaggio utile.
window.addEventListener("load", function () {
  setTimeout(function () {
    var ok = window.React && window.ReactDOM && window.Babel;
    var loader = document.getElementById("boot-loader");
    if (!ok && loader) {
      loader.innerHTML =
        '<div style="text-align:center;color:#64748b;padding:24px;max-width:340px">' +
        '<div style="font-size:40px;margin-bottom:14px">📡</div>' +
        '<div style="font-size:15px;font-weight:700;color:#1e293b;margin-bottom:8px">Connessione richiesta al primo avvio</div>' +
        '<div style="font-size:13px;line-height:1.6">Per usare l\'app offline, aprila almeno una volta con una connessione internet attiva. Dopo il primo caricamento funzionerà anche senza rete.</div>' +
        '<button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;border:none;border-radius:9px;background:#2563eb;color:#fff;font-weight:700;font-size:13px;cursor:pointer">↻ Riprova</button>' +
        '</div>';
    }
  }, 1200);
});
</script>

// ─── Fusione valori nutrizionali negli ingredienti ───────────────────
// Aggiunge a ogni ingrediente il campo .nutri con i valori per 100 g
// di parte edibile (p, c, z, g, f, kcal). Vedi NUTRI sopra per la fonte.
INGREDIENTS.forEach(i => { i.nutri = NUTRI[i.id] || null; });

// Helper: valori nutrizionali per una quantità in grammi di un ingrediente
function nutriPerGrammi(ingId, grammi) {
  const n = (ING_MAP[ingId] || {}).nutri;
  if (!n || !grammi) return { p:0, c:0, z:0, g:0, f:0, kcal:0 };
  const k = grammi / 100;
  return {
    p:    +(n.p    * k).toFixed(1),
    c:    +(n.c    * k).toFixed(1),
    z:    +(n.z    * k).toFixed(1),
    g:    +(n.g    * k).toFixed(1),
    f:    +(n.f    * k).toFixed(1),
    kcal: Math.round(n.kcal * k),
  };
}

// ─── Calcolo macro delle ricette dagli ingredienti ───────────────────
// Converte le quantità di ING_QTY in grammi di parte edibile e somma
// i valori nutrizionali via nutriPerGrammi().

// Peso medio (g) della parte edibile per gli ingredienti venduti "a pezzo".
const PESO_PEZZO = {
  ing_uova:       50,   // un uovo medio senza guscio
  ing_banana:     120,  // una banana media sbucciata
  ing_mela:       150,  // una mela media edibile
  ing_pera:       150,
  ing_arancia:    160,
  ing_mandarino:  70,
  ing_kiwi:       80,
  ing_pesche:     120,
  ing_albicocche: 40,
  ing_limone:     60,   // di norma se ne usa il succo/scorza: peso indicativo
  ing_avocado:    140,  // polpa di mezzo/un avocado
  ing_aglio:      5,    // uno spicchio
  ing_sedano:     40,   // una costa
  ing_porri:      100,  // un porro pulito
  ing_rosmarino:  3,    // un rametto
};

// Fattori di conversione → grammi. "g" e "ml" ≈ 1:1; il cucchiaio è
// usato solo per l'olio EVO (~10 g a cucchiaio).
function quantitaInGrammi(ingId, valore, unit) {
  if (!valore) return 0;
  switch (unit) {
    case "g":          return valore;
    case "ml":         return valore;                       // densità ≈ 1
    case "cucchiaio":  return valore * 10;                   // 1 cucchiaio ≈ 10 g
    case "cucchiaino": return valore * 5;
    case "pz":         return valore * (PESO_PEZZO[ingId] || 100);
    default:           return valore;
  }
}

// Macro di una ricetta per una persona ("uomo" | "donna" | "bimbo"),
// calcolati sommando gli ingredienti. Restituisce null se mancano le
// quantità per quella ricetta.
function macroRicettaCalc(ricettaId, persona) {
  const qty = ING_QTY[ricettaId];
  if (!qty) return null;
  const tot = { p:0, c:0, z:0, g:0, f:0, kcal:0 };
  for (const [ingId, q] of Object.entries(qty)) {
    const grammi = quantitaInGrammi(ingId, q[persona], q.unit);
    const n = nutriPerGrammi(ingId, grammi);
    tot.p += n.p; tot.c += n.c; tot.z += n.z;
    tot.g += n.g; tot.f += n.f; tot.kcal += n.kcal;
  }
  return {
    p:    Math.round(tot.p),
    c:    Math.round(tot.c),
    z:    Math.round(tot.z),
    g:    Math.round(tot.g),
    f:    Math.round(tot.f),
    kcal: Math.round(tot.kcal),
  };
}

// ═══════════════════════════════════════════════════════════════════
// MOTORE DI SCALING DELLE PORZIONI
// ═══════════════════════════════════════════════════════════════════
// Dato il fabbisogno (personaTarget da calcTargetAdattivo) e i pasti
// del giorno, ricalcola le quantità di ING_QTY perché i totali del
// giorno aderiscano a kcal, proteine, carboidrati e grassi.
// Ogni ingrediente ha un fattore di scala proprio, ottimizzato per
// discesa iterativa sui 4 macro; condimenti e aromi restano quasi
// fissi grazie a un'elasticità ridotta.
// ═══════════════════════════════════════════════════════════════════

// Elasticità (min/max sul fattore) in base alla categoria.
function elasticitaIngrediente(ing) {
  if (!ing) return { min: 0.9, max: 1.15 };
  switch (ing.cat) {
    case "🥩 Proteine":     return { min: 0.55, max: 1.8 };
    case "🥛 Latticini":    return { min: 0.55, max: 1.8 };
    case "🌾 Cereali":      return { min: 0.5,  max: 2.5 };
    case "🫘 Legumi":       return { min: 0.5,  max: 2.5 };
    case "🥦 Verdure":      return { min: 0.6,  max: 1.6 };
    case "🍎 Frutta":       return { min: 0.6,  max: 1.6 };
    case "🥜 Frutta secca": return { min: 0.5,  max: 1.5 };
    case "🧂 Dispensa":     return { min: 0.85, max: 1.2 };
    case "🛒 Altro":        return { min: 0.85, max: 1.2 };
    default:                return { min: 0.9,  max: 1.15 };
  }
}

// Limiti assoluti per singolo ingrediente (g di parte edibile).
// Limiti assoluti per singolo ingrediente (g di parte edibile).
// I massimi coprono porzioni abbondanti per fabbisogni alti (uomo
// molto attivo); i minimi restano contenuti per i bambini. Tetti
// troppo bassi impediscono al motore di centrare target elevati.
const LIMITI_SCALING = {
  ing_pasta:{min:35,max:180}, ing_riso:{min:35,max:180},
  ing_pasta_fresca:{min:45,max:200}, ing_riso_venere:{min:35,max:180},
  ing_farro:{min:35,max:170}, ing_orzo:{min:35,max:170},
  ing_quinoa:{min:35,max:170}, ing_bulgur:{min:35,max:170},
  ing_couscous:{min:35,max:170}, ing_avena:{min:20,max:150},
  ing_pane:{min:20,max:160},
  ing_evo:{min:4,max:30}, ing_olio_semi:{min:4,max:30},
};

function clampScale(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Sceglie la taglia base (uomo/donna/bimbo) più vicina al target kcal.
function scegliTagliaBase(pastiDelGiorno, target) {
  const kcalBase = (persona) => {
    let k = 0;
    for (const ricetta of pastiDelGiorno) {
      const qty = ING_QTY[ricetta.id];
      if (!qty) continue;
      for (const [ingId, v] of Object.entries(qty)) {
        k += nutriPerGrammi(ingId, quantitaInGrammi(ingId, v[persona], v.unit)).kcal;
      }
    }
    return k;
  };
  let migliore = "donna", minDiff = Infinity;
  for (const persona of ["uomo", "donna", "bimbo"]) {
    const diff = Math.abs(kcalBase(persona) - target.kcal);
    if (diff < minDiff) { minDiff = diff; migliore = persona; }
  }
  return migliore;
}

// scalaPastiGiorno(pastiDelGiorno, target, personaBase?)
//   pastiDelGiorno : array di ricette (oggetti del DB) del giorno
//   target         : { kcal, p, c, g }
//   personaBase    : opzionale; se assente, scelta automatica
// Ritorna { perRicetta, totali, totaliBase, tagliaBase }.
function scalaPastiGiorno(pastiDelGiorno, target, personaBase) {
  if (!personaBase) personaBase = scegliTagliaBase(pastiDelGiorno, target);

  const items = [];
  for (const ricetta of pastiDelGiorno) {
    const qty = ricetta && ING_QTY[ricetta.id];
    if (!qty) continue;
    for (const [ingId, v] of Object.entries(qty)) {
      const gBase = quantitaInGrammi(ingId, v[personaBase], v.unit);
      if (gBase <= 0) continue;
      const ing = ING_MAP[ingId];
      const n = (ing && ing.nutri) || { p:0, c:0, g:0, kcal:0 };
      items.push({
        ricettaId: ricetta.id, ingId, unit: v.unit,
        gBase, fattore: 1,
        el: elasticitaIngrediente(ing),
        lim: LIMITI_SCALING[ingId] || null,
        pPg: n.p/100, cPg: n.c/100, gPg: n.g/100, kPg: n.kcal/100,
      });
    }
  }
  if (!items.length) {
    return { perRicetta:{}, totali:{kcal:0,p:0,c:0,g:0}, totaliBase:{kcal:0,p:0,c:0,g:0}, tagliaBase:personaBase };
  }

  const grammiDi = (it) => {
    let g = it.gBase * it.fattore;
    g = clampScale(g, it.gBase * it.el.min, it.gBase * it.el.max);
    if (it.lim) g = clampScale(g, it.lim.min, it.lim.max);
    return g;
  };
  const totali = () => {
    const t = { kcal:0, p:0, c:0, g:0 };
    for (const it of items) {
      const g = grammiDi(it);
      t.p += it.pPg*g; t.c += it.cPg*g; t.g += it.gPg*g; t.kcal += it.kPg*g;
    }
    return t;
  };

  const totBase = totali();

  // Ottimizzazione a gradiente sull'errore quadratico dei macro.
  // Concettualmente: ogni ricetta è una SOMMATORIA di ingredienti, e
  // ogni ingrediente può variare indipendentemente. Definiamo
  //   L = wp·(p_tot/p_target - 1)² + wc·(c_tot/c_target - 1)² + wg·(g_tot/g_target - 1)²
  // e muoviamo ogni fattore lungo -∂L/∂f. La derivata è proporzionale
  // al contributo dell'ingrediente al macro in errore: un cibo molto
  // proteico riceve una spinta forte quando le proteine sono in eccesso
  // o in difetto, mentre i grassi lo influenzano solo in proporzione
  // al suo contenuto di grassi reale.
  // Questo permette al motore di RIBILANCIARE INTERNAMENTE una ricetta:
  // a parità di kcal, alza il riso e abbassa il salmone se servono più
  // carbo e meno grassi (la ricetta è la somma dei suoi ingredienti).
  const W = { p:1.2, c:1.0, g:1.0 };       // pesi macro
  const PASSO = 0.35, MAX_ITER = 60;
  let prevLoss = Infinity;
  for (let iter = 0; iter < MAX_ITER; iter++) {
    const t = totali();
    // errori relativi (target/attuale - 1), invertiti perché derivare in fattore
    // crescente significa aumentare il macro
    const eP = t.p > 0 ? (target.p - t.p) / target.p : 0;
    const eC = t.c > 0 ? (target.c - t.c) / target.c : 0;
    const eG = t.g > 0 ? (target.g - t.g) / target.g : 0;
    // loss per controllo convergenza
    const loss = W.p*eP*eP + W.c*eC*eC + W.g*eG*eG;
    // spinta per ingrediente: somma dei contributi normalizzati × errore × peso
    let maxDelta = 0;
    for (const it of items) {
      const g = grammiDi(it);
      // contributo dell'ingrediente al macro corrente / target macro
      const dP = (it.pPg * g) / Math.max(target.p, 1);
      const dC = (it.cPg * g) / Math.max(target.c, 1);
      const dG = (it.gPg * g) / Math.max(target.g, 1);
      // gradiente: ∂L/∂f scala come (-2)·Σ(macro_target·err·dM/df)/target
      // semplifichiamo in una spinta proporzionale all'errore pesata sul contributo
      const spinta = W.p*eP*dP + W.c*eC*dC + W.g*eG*dG;
      // normalizziamo per il "peso totale" dell'ingrediente nei macro
      // così uno yogurt e un cucchiaio d'olio ricevono spinte di scala simile
      const peso = W.p*dP + W.c*dC + W.g*dG;
      if (peso < 1e-9) continue;
      const delta = (spinta / peso) * PASSO;
      const nuovoF = it.fattore * (1 + delta);
      maxDelta = Math.max(maxDelta, Math.abs(nuovoF - it.fattore));
      it.fattore = nuovoF;
    }
    // convergenza: loss che smette di scendere o passi piccolissimi
    if (maxDelta < 0.002) break;
    if (iter > 8 && loss > prevLoss * 0.999) break;
    prevLoss = loss;
  }

  const perRicetta = {};
  for (const it of items) {
    const g = grammiDi(it);
    if (!perRicetta[it.ricettaId]) perRicetta[it.ricettaId] = {};
    let val;
    if (it.unit === "g" || it.unit === "ml") {
      val = Math.max(5, Math.round(g / 5) * 5);
    } else {
      const perUnit = quantitaInGrammi(it.ingId, 1, it.unit) || 1;
      val = Math.round((g / perUnit) * 2) / 2;
    }
    perRicetta[it.ricettaId][it.ingId] = { valore: val, unit: it.unit };
  }

  const totFin = totali();
  const round = (o) => ({ kcal:Math.round(o.kcal), p:Math.round(o.p), c:Math.round(o.c), g:Math.round(o.g) });
  return { perRicetta, totali: round(totFin), totaliBase: round(totBase), tagliaBase: personaBase };
}

// Macro di UNA ricetta data una mappa di quantità {ingId:{valore,unit}}.
function macroDaQuantita(quantitaMap) {
  const tot = { kcal:0, p:0, c:0, g:0 };
  for (const [ingId, q] of Object.entries(quantitaMap || {})) {
    const grammi = quantitaInGrammi(ingId, q.valore, q.unit);
    const n = nutriPerGrammi(ingId, grammi);
    tot.kcal += n.kcal; tot.p += n.p; tot.c += n.c; tot.g += n.g;
  }
  return { kcal:Math.round(tot.kcal), p:Math.round(tot.p), c:Math.round(tot.c), g:Math.round(tot.g) };
}

// Trasforma una mappa di quantità {ingId:{valore,unit}} in testo leggibile,
// es. "255g yogurt greco · 110g avena · 130g frutti di bosco".
// Usata per mostrare le porzioni personalizzate nella scheda pasto.
function formattaPorzione(quantitaMap) {
  const pezzi = [];
  for (const [ingId, q] of Object.entries(quantitaMap || {})) {
    const ing = ING_MAP[ingId];
    const nome = ing ? ing.nome.toLowerCase() : ingId;
    let qta;
    if (q.unit === "g" || q.unit === "ml") {
      qta = Math.round(q.valore) + q.unit;
    } else if (q.unit === "cucchiaio" || q.unit === "cucchiaino") {
      const n = q.valore;
      qta = (n === 0.5 ? "½" : n) + " " + q.unit + (n > 1 ? "i" : "");
    } else if (q.unit === "pz") {
      qta = (q.valore === 0.5 ? "½" : q.valore) + " pz";
    } else {
      qta = q.valore + " " + q.unit;
    }
    pezzi.push(qta + " " + nome);
  }
  return pezzi.join(" · ");
}

  r.uomoCalc  = macroRicettaCalc(r.id, "uomo");
  r.donnaCalc = macroRicettaCalc(r.id, "donna");

});

// ─── Diagnostica: confronto macro scritti a mano vs calcolati ────────
// Strumento di verifica per chi mantiene l'app. Da console del browser:
//   confrontoMacro()        → elenca le ricette con scostamento kcal > 20%
//   confrontoMacro(0)       → elenca TUTTE le ricette
//   confrontoMacro(20,"col")→ solo ricette il cui id inizia per "col"
// Serve a individuare quantità errate in ING_QTY prima di affidarsi
// ai valori calcolati al posto di quelli scritti a mano.
function confrontoMacro(sogliaPct = 20, prefisso = "") {
  const righe = [];
  Object.values(DB).flat().forEach(r => {
    if (prefisso && !r.id.startsWith(prefisso)) return;
    const h = r.uomo, c = r.uomoCalc;
    if (!c) { righe.push({ id:r.id, nome:r.nome, stato:"NO ING_QTY" }); return; }
    const diff = h.kcal ? Math.round((c.kcal - h.kcal) / h.kcal * 100) : 0;
    if (Math.abs(diff) >= sogliaPct) {
      righe.push({
        id:r.id, nome:r.nome,
        kcalManuale:h.kcal, kcalCalcolato:c.kcal,
        scostamento:(diff>0?"+":"")+diff+"%",
      });
    }
  });
  console.table(righe);
  console.log(`${righe.length} ricette con scostamento ≥ ${sogliaPct}% (o senza ING_QTY).`);
  return righe;
}

// ═══════════════════════════════════════════════════════════════════
// SISTEMA PREFERENZE — accumulo segnali sui gusti
// ═══════════════════════════════════════════════════════════════════
// Uno swap NON è un segnale unico. Va distinto in due tipi:
//
//  • SWAP DI GUSTO   → fatto con anticipo (es. lunedì cambio il piatto
//                      di mercoledì). È un giudizio sulla ricetta.
//                      Penalizza/premia il punteggio gusti.
//  • SWAP DI CONTESTO→ fatto a ridosso del pasto (es. cambio la cena
//                      di stasera alle 19:30 perché è tardi). NON è un
//                      giudizio sul gusto: la ricetta resta amata.
//                      Si registra a parte come dato grezzo di fascia
//                      oraria, per analisi future.
//
// Il discriminante è quante ORE mancano dal momento dello swap al
// pasto bersaglio. Sotto la soglia = contesto, sopra = gusto.
//
// Struttura salvata in SK_PREFS:
// {
//   recipes: { "<id>": { score, liked, swapsOut, swapsIn, updated } },
//   contextSwaps: [ { ts, dayIdx, mealKey, hoursAhead,
//                      outId, outNome, outPrep, inId, inNome, inPrep } ]
// }
const PREF_WEIGHTS = { like: 3, swapOut: -1, swapIn: 1 };

// Soglia in ore: sotto questo valore lo swap è "di contesto".
const SWAP_CONTEXT_HOURS = 18;

// Orari convenzionali di consumo di ogni pasto (ora del giorno, 0-24).
const MEAL_HOUR = {
  colazione: 8,
  spuntino_m: 10.5,
  pranzo: 13,
  spuntino_p: 16.5,
  cena: 20,
};

// Quante ore mancano da "adesso" al pasto (dayIdx 0=Lun..6=Dom, mealKey).
// Usa todayDayIndex() per ancorare la settimana al giorno corrente.
function hoursUntilMeal(dayIdx, mealKey) {
  const now = new Date();
  const today = todayDayIndex();          // 0=Lun..6=Dom
  let dayDelta = dayIdx - today;          // giorni di distanza nel piano
  // il piano è una settimana fissa Lun→Dom: niente wrap, range -6..+6
  const mealHour = MEAL_HOUR[mealKey] != null ? MEAL_HOUR[mealKey] : 13;
  const nowHours = now.getHours() + now.getMinutes() / 60;
  return dayDelta * 24 + (mealHour - nowHours);
}

// Classifica uno swap: "contesto" se il pasto è imminente, "gusto" altrimenti.
// Gli swap già passati (hoursAhead negativo) li trattiamo come gusto:
// rivedere a posteriori un pasto è una valutazione, non fretta.
function classifySwap(dayIdx, mealKey) {
  const h = hoursUntilMeal(dayIdx, mealKey);
  if (h >= 0 && h < SWAP_CONTEXT_HOURS) return "contesto";
  return "gusto";
}

// Calcola lo score sintetico a partire dai segnali grezzi.
function computePrefScore(entry) {
  if (!entry) return 0;
  const like = entry.liked ? PREF_WEIGHTS.like : 0;
  const out  = (entry.swapsOut || 0) * PREF_WEIGHTS.swapOut;
  const sIn  = (entry.swapsIn  || 0) * PREF_WEIGHTS.swapIn;
  return like + out + sIn;
}

// Normalizza la struttura prefs completa (mai undefined).
// Retrocompatibile col vecchio formato piatto { id: {...} }.
function normalizePrefs(raw) {
  if (!raw || typeof raw !== "object") return { recipes:{}, contextSwaps:[] };
  // Vecchio formato: oggetto con chiavi ricetta direttamente in radice
  if (!raw.recipes && !raw.contextSwaps) {
    const looksLikeRecipes = Object.keys(raw).some(k => /^(col|spu|pra|cen)_/.test(k));
    if (looksLikeRecipes) return { recipes: raw, contextSwaps: [] };
    return { recipes:{}, contextSwaps:[] };
  }
  return {
    recipes: (raw.recipes && typeof raw.recipes==="object") ? raw.recipes : {},
    contextSwaps: Array.isArray(raw.contextSwaps) ? raw.contextSwaps : [],
  };
}

// Restituisce la entry di una ricetta normalizzata (mai undefined).
function getPrefEntry(prefs, recipeId) {
  const recipes = (prefs && prefs.recipes) || {};
  const e = recipes[recipeId];
  return e ? { score:0, liked:false, swapsOut:0, swapsIn:0, ...e }
           : { score:0, liked:false, swapsOut:0, swapsIn:0 };
}

// ─── Trova alternativa per tempo ────────────────────────────────────
// Restituisce le ricette della stessa categoria ordinate per:
// 1. rispettano maxPrep
// 2. simili per kcal al pasto corrente (slot personaSlot)
// 3. non già usate nella settimana (weekMealIds)
function findAlternatives(mealKey, currentMeal, maxPrep, excludedIds, weekMealIds, personaSlot) {
  // Mappa mealKey → categoria DB
  const cat = mealKey === "spuntino_m" || mealKey === "spuntino_p" ? "spuntino"
            : mealKey === "colazione" ? "colazione"
            : mealKey === "pranzo"    ? "pranzo"
            : "cena";

  const currentKcal = currentMeal[personaSlot]?.kcal || 500;
  const m = meseCorrente();

  return DB[cat]
    .filter(r =>
      r.id !== currentMeal.id &&                                      // non la stessa
      (r.prep || 0) <= maxPrep &&                                     // entro il tempo
      !r.ingredients.some(id => excludedIds.includes(id)) &&          // no esclusi
      pesoStagionale(r, m) > 0                                        // di stagione
    )
    .map(r => ({
      ...r,
      _kcalDiff: Math.abs((r[personaSlot]?.kcal || 0) - currentKcal),
      _inWeek:   weekMealIds.has(r.id),
    }))
    .sort((a, b) => {
      // prima le non già in settimana, poi per kcal più simili
      if (a._inWeek !== b._inWeek) return a._inWeek ? 1 : -1;
      return a._kcalDiff - b._kcalDiff;
    })
    .slice(0, 6); // max 6 alternative da mostrare
}

// ─── Giorno corrente automatico (0=Lun … 6=Dom) ───────────────────
function todayDayIndex() {
  const d = new Date().getDay(); // 0=Dom,1=Lun,...,6=Sab
  return d === 0 ? 6 : d - 1;   // converti in 0=Lun … 6=Dom
}

// ─── SVG Line Chart ────────────────────────────────────────────────
function LineChart({ records, field, color, unit, label }) {
  // records ordinati dal più vecchio al più recente
  const pts = records.map(r => parseFloat(r[field])).filter(v => !isNaN(v));
  if (pts.length < 2) return null;

  const W = 320, H = 90, PAD = { t:10, r:12, b:24, l:36 };
  const innerW = W - PAD.l - PAD.r;
  const innerH = H - PAD.t - PAD.b;

  const mn = Math.min(...pts), mx = Math.max(...pts);
  const range = mx - mn || 1;

  // coordinate punti
  const coords = pts.map((v, i) => ({
    x: PAD.l + (i / (pts.length - 1)) * innerW,
    y: PAD.t + (1 - (v - mn) / range) * innerH,
    v
  }));

  // polyline path
  const polyline = coords.map((c, i) => `${i === 0 ? "M" : "L"}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(" ");
  // area fill path
  const area = polyline + ` L${coords[coords.length-1].x.toFixed(1)},${(PAD.t+innerH).toFixed(1)} L${coords[0].x.toFixed(1)},${(PAD.t+innerH).toFixed(1)} Z`;

  // delta totale
  const deltaTotal = (pts[pts.length-1] - pts[0]).toFixed(1);
  const deltaPos = parseFloat(deltaTotal) > 0;
  const deltaNeu = parseFloat(deltaTotal) === 0;

  // label date primo e ultimo
  const dateFirst = records.filter(r => !isNaN(parseFloat(r[field])))[0]?.date || "";
  const dateLast  = records.filter(r => !isNaN(parseFloat(r[field]))).at(-1)?.date || "";

  // tick Y (min e max)
  const yLabelMn = PAD.t + innerH;
  const yLabelMx = PAD.t;

  return (
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontSize:12,fontWeight:700,color}}>{label}</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:13,fontFamily:"monospace",fontWeight:800,color:"#1e293b"}}>{pts[pts.length-1]} {unit}</span>
          <span style={{fontSize:11,fontWeight:700,color:deltaNeu?"#94a3b8":deltaPos?"#ef4444":"#16a34a",background:deltaNeu?"#f1f5f9":deltaPos?"#fef2f2":"#f0fdf4",borderRadius:6,padding:"2px 7px"}}>
            {deltaNeu?"—":deltaPos?`▲ +${deltaTotal}`:`▼ ${deltaTotal}`}
          </span>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible",display:"block"}}>
        <defs>
          <linearGradient id={`grad-${field}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.01"/>
          </linearGradient>
        </defs>
        {/* Griglia orizzontale */}
        {[0, 0.5, 1].map(t => (
          <line key={t} x1={PAD.l} y1={PAD.t + t*innerH} x2={PAD.l+innerW} y2={PAD.t + t*innerH}
            stroke="#f1f5f9" strokeWidth="1"/>
        ))}
        {/* Y labels */}
        <text x={PAD.l-4} y={yLabelMx+4} textAnchor="end" fontSize="8" fill="#94a3b8">{mx}</text>
        <text x={PAD.l-4} y={yLabelMn}   textAnchor="end" fontSize="8" fill="#94a3b8">{mn}</text>
        {/* Area fill */}
        <path d={area} fill={`url(#grad-${field})`}/>
        {/* Linea */}
        <path d={polyline} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
        {/* Punti */}
        {coords.map((c, i) => (
          <circle key={i} cx={c.x} cy={c.y} r={i===coords.length-1?4:2.5}
            fill={i===coords.length-1?color:"#fff"} stroke={color} strokeWidth="1.8"/>
        ))}
        {/* X labels: prima e ultima data */}
        <text x={coords[0].x} y={H-2} textAnchor="middle" fontSize="8" fill="#94a3b8">{dateFirst}</text>
        <text x={coords[coords.length-1].x} y={H-2} textAnchor="middle" fontSize="8" fill="#94a3b8">{dateLast}</text>
      </svg>
    </div>
  );
}

function dateToSort(d) {
  // "gg/mm/aaaa" → "aaaammgg" per ordinamento
  try { const [g,m,a]=d.split("/"); return `${a}${m.padStart(2,"0")}${g.padStart(2,"0")}`; }
  catch { return "00000000"; }
}
function dateToLabel(d) {
  try {
    const [g,m,a]=d.split("/");
    const dt=new Date(+a,+m-1,+g);
    const giorni=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
    return `${giorni[dt.getDay()]} ${g}/${m}`;
  } catch { return d; }
}

function MisurePage({ personas, myPersonaId, onMisureChange }) {
  const [misure, setMisure]   = useState({});
  const [selPid, setSelPid]   = useState(myPersonaId || personas[0]?.id);

  // Helper per swipe orizzontale tra persone (wrap-around).
  const cambiaSelPid = (dir) => {
    if (!personas.length) return;
    const idx = personas.findIndex(p=>p.id===selPid);
    const i = idx < 0 ? 0 : idx;
    setSelPid(personas[(i + dir + personas.length) % personas.length].id);
  };
  const [loaded, setLoaded]   = useState(false);
  const [view, setView]       = useState("stats");   // "stats" | "history" | "form"
  const [editRec, setEditRec] = useState(null);      // record in modifica (null = nuovo)
  const [calcCard, setCalcCard] = useState(0);        // indice scheda calcolatore (0-5)

  const emptyForm = () => Object.fromEntries(TUTTI_FIELDS.map(f=>[f.key,""]));
  const [form, setForm]       = useState(emptyForm());
  const [formDate, setFormDate] = useState(() => new Date().toLocaleDateString("it-IT"));

  useEffect(()=>{
    window.storage.get(SK_MISURE).then(r=>setMisure(JSON.parse(r.value))).catch(()=>{}).finally(()=>setLoaded(true));
  },[]);

  const persist = async next => {
    setMisure(next);
    await window.storage.set(SK_MISURE,JSON.stringify(next)).catch(()=>{});
    if (onMisureChange) onMisureChange(next);
  };

  // record persona corrente, ordinati dal più vecchio al più recente
  const allRecs = (misure[selPid]||[]).slice().sort((a,b)=>dateToSort(a.date).localeCompare(dateToSort(b.date)));
  // dal più recente per la history
  const recsDesc = [...allRecs].reverse();

  const persona = personas.find(p=>p.id===selPid)||personas[0];

  // ── apertura form ──
  const openNew = () => {
    setForm(emptyForm());
    setFormDate(new Date().toLocaleDateString("it-IT"));
    setEditRec(null);
    setView("form");
  };
  const openEdit = rec => {
    setForm(Object.fromEntries(TUTTI_FIELDS.map(f=>[f.key, rec[f.key]!==undefined&&rec[f.key]!==""?String(rec[f.key]):""])));
    setFormDate(rec.date);
    setEditRec(rec);
    setView("form");
  };

  // ── salvataggio ──
  const handleSave = async () => {
    const entry = { date:formDate, ...Object.fromEntries(TUTTI_FIELDS.map(f=>[f.key, form[f.key]===""?"":parseFloat(form[f.key])||""])) };
    const cur = (misure[selPid]||[]).slice();
    if (editRec) {
      const idx = cur.findIndex(r=>JSON.stringify(r)===JSON.stringify(editRec));
      if (idx>=0) cur[idx]=entry; else cur.push(entry);
    } else {
      cur.push(entry);
    }
    await persist({...misure,[selPid]:cur});
    setView("stats");
  };

  const handleDelete = async rec => {
    const cur = (misure[selPid]||[]).filter(r=>JSON.stringify(r)!==JSON.stringify(rec));
    await persist({...misure,[selPid]:cur});
  };

  // ── statistiche riassuntive ──
  const statFor = key => {
    const vals = allRecs.map(r=>parseFloat(r[key])).filter(v=>!isNaN(v));
    if (!vals.length) return null;
    const first=vals[0], last=vals[vals.length-1];

        /* ══ STORICO ══ */

          {recsDesc.map((rec,idx)=>{

                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {TUTTI_FIELDS.map(f=>{

                    const hasVal = val!==""&&val!==undefined&&!isNaN(parseFloat(val));

                    const curVal  = parseFloat(val);
                    const d = (!isNaN(curVal)&&!isNaN(prevVal)) ? (curVal-prevVal).toFixed(1) : null;
                    const dNum = parseFloat(d);
                    return (
                      <div key={f.key} style={{background:f.color+"08",borderRadius:8,padding:"8px 6px",border:`1px solid ${f.color}20`,textAlign:"center"}}>
                        <div style={{fontSize:9,color:f.color,fontWeight:700,textTransform:"uppercase",letterSpacing:0.4,marginBottom:2}}>{f.emoji} {f.label}</div>
                        <div style={{fontSize:15,fontWeight:800,color:hasVal?"#1e293b":"#cbd5e1",fontFamily:"monospace"}}>
                          {hasVal?val:"—"}
                          {hasVal&&<span style={{fontSize:8,color:"#94a3b8",marginLeft:1}}>{f.unit}</span>}
                        </div>
                        {d!==null&&(
                          <div style={{fontSize:9,fontWeight:700,color:dNum===0?"#94a3b8":dNum<0?"#16a34a":"#ef4444",marginTop:1}}>

                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
          <div style={{marginTop:4,fontSize:10,color:"#94a3b8",textAlign:"center",paddingBottom:8}}>
            ▼ verde = riduzione · ▲ rosso = aumento rispetto alla rilevazione precedente

        </>
      )}
    </SwipeContainer>
  );
}

// ─── Utilities ───────────────────────────────────────────────────────
function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

// ─── Helpers stagionalità ───────────────────────────────────────────
function meseCorrente() { return new Date().getMonth() + 1; } // 1–12

function pesoStagionale(ricetta, mese) {
  // Conta quanti ingredienti della ricetta sono fuori stagione
  let fuori = 0;
  for (const ingId of ricetta.ingredients) {
    const ing = ING_MAP[ingId];
    if (!ing) continue;
    if (ing.stagioni && !ing.stagioni.includes(mese)) fuori++;
  }
  if (fuori === 0) return 4;  // tutto di stagione → priorità massima
  if (fuori === 1) return 2;  // un ingrediente fuori → accettabile
  if (fuori === 2) return 1;  // due fuori → bassa priorità
  return 0;                   // tre+ fuori → esclusa
}

function buildWeightedPool(ricette, excludedIds, mese) {
  const pool = [];
  for (const r of ricette) {
    if (r.ingredients.some(id => excludedIds.includes(id))) continue;
    const w = pesoStagionale(r, mese);
    if (w > 0) for (let i = 0; i < w; i++) pool.push(r);
  }
  // fallback: se il pool è vuoto (tutti esclusi o fuori stagione) usa tutto
  return pool.length > 0 ? pool : ricette.filter(r => !r.ingredients.some(id => excludedIds.includes(id)));
}

function generateWeekPlan(seed, excludedIds = [], mese) {
  const m = mese || meseCorrente();
  const rng = seededRng(seed);

  const pickSeven = (cat) => {
    const pool = buildWeightedPool(DB[cat], excludedIds, m);
    if (!pool.length) return DB[cat].slice(0, 7);
    const picked = [], usedIds = new Set();
    let attempts = 0;
    while (picked.length < 7 && attempts < 300) {
      attempts++;
      const r = pool[Math.floor(rng() * pool.length)];
      if (!usedIds.has(r.id) || usedIds.size >= new Set(pool.map(x=>x.id)).size) {
        usedIds.add(r.id);
        picked.push(r);
      }
    }
    return picked.slice(0, 7);
  };

  const cols   = pickSeven("colazione");
  const pranzi = pickSeven("pranzo");
  const cene   = pickSeven("cena");

  // Spuntini: pool pesato, no due uguali consecutivi
  const spPool = buildWeightedPool(DB.spuntino, excludedIds, m).length
    ? buildWeightedPool(DB.spuntino, excludedIds, m)
    : DB.spuntino;
  const spuntini = [];
  for (let i = 0; i < 14; i++) {
    const excl = spuntini.slice(-2).map(s => s.id);
    const avail = spPool.filter(s => !excl.includes(s.id));
    const src   = avail.length ? avail : spPool;
    spuntini.push(src[Math.floor(rng() * src.length)]);
  }

  return DAYS.map((day, i) => ({
    day,
    colazione:  cols[i],
    spuntino_m: spuntini[i * 2],
    pranzo:     pranzi[i],
    spuntino_p: spuntini[i * 2 + 1],
    cena:       cene[i],
    mese:       m,
  }));
}

// Converte "gg/mm/aaaa" in Date
function parseDataIT(s) {
  try { const [g,m,a]=s.split("/"); return new Date(+a,+m-1,+g); } catch { return null; }
}

// ═══════════════════════════════════════════════════════════════════
// FABBISOGNO CALORICO — metodo LARN/SINU (tabella italiana)
// ═══════════════════════════════════════════════════════════════════
// Metabolismo Basale per fascia d'età e sesso:  MB = coeff·P + costante.
// Fabbisogno = MB × LAF (Livello Attività Fisica).
// La tabella copre solo adulti (≥18 anni): per i minori chi chiama usa
// il fallback Mifflin-St Jeor.
// ═══════════════════════════════════════════════════════════════════

// Coefficienti MB: [coeff, costante] per fascia d'età, per sesso.
const MB_COEFF_LARN = {
  F: [
    { maxEta: 29, c: 14.7, k: 496 },
    { maxEta: 59, c: 8.7,  k: 829 },
    { maxEta: 74, c: 9.2,  k: 688 },
    { maxEta: Infinity, c: 9.8, k: 624 },
  ],
  M: [
    { maxEta: 29, c: 15.3, k: 679 },
    { maxEta: 59, c: 11.6, k: 879 },
    { maxEta: 74, c: 11.9, k: 700 },
    { maxEta: Infinity, c: 8.4, k: 819 },
  ],
};

function metabolismoBasaleLARN(sesso, eta, pesoKg) {
  const tab = MB_COEFF_LARN[sesso === "M" ? "M" : "F"];
  const fascia = tab.find(f => eta <= f.maxEta) || tab[tab.length - 1];
  return fascia.c * pesoKg + fascia.k;
}

// LAF per sesso, fascia d'età, intensità lavoro e attività auspicabile.
const LAF_TAB_LARN = {
  F: {
    adulto: {
      leggero:  { si: 1.56, no: 1.42 },
      moderato: { si: 1.64, no: 1.56 },
      pesante:  { si: 1.82, no: 1.73 },
    },
    eta60_74: { si: 1.56, no: 1.44 },
    eta75:    { si: 1.56, no: 1.37 },
  },
  M: {
    adulto: {
      leggero:  { si: 1.55, no: 1.41 },
      moderato: { si: 1.78, no: 1.70 },
      pesante:  { si: 2.10, no: 2.01 },
    },
    eta60_74: { si: 1.51, no: 1.40 },
    eta75:    { si: 1.51, no: 1.33 },
  },
};

// Lo "stile" dell'app → (intensità lavoro, attività auspicabile).
// La tabella LARN richiede due dimensioni; l'app ha il solo `stile`,
// che esprime il livello di attività complessivo: lo scomponiamo.
const STILE_TO_LARN = {
  sedentario:   { lavoro: "leggero",  auspicabile: false },
  leggero:      { lavoro: "leggero",  auspicabile: true  },
  attivo:       { lavoro: "moderato", auspicabile: true  },
  molto_attivo: { lavoro: "pesante",  auspicabile: false },
  sportivo:     { lavoro: "pesante",  auspicabile: true  },
};

function lafLARN(sesso, eta, stile) {
  const S = LAF_TAB_LARN[sesso === "M" ? "M" : "F"];
  const map = STILE_TO_LARN[stile] || STILE_TO_LARN.attivo;
  const chiave = map.auspicabile ? "si" : "no";
  if (eta >= 75) return S.eta75[chiave];
  if (eta >= 60) return S.eta60_74[chiave];
  return S.adulto[map.lavoro][chiave];
}

// Fabbisogno calorico LARN completo. Ritorna anche i componenti.
function fabbisognoLARN(sesso, eta, pesoKg, stile) {
  const mb  = metabolismoBasaleLARN(sesso, eta, pesoKg);
  const laf = lafLARN(sesso, eta, stile);
  return { mb: Math.round(mb), laf, fabbisogno: Math.round(mb * laf) };
}

// Stima %grasso formula US Navy
function stimaGrasso(p, misureRec) {
  if (!misureRec) return null;
  const { altezza, sesso } = p;
  const vita   = parseFloat(misureRec.vita);
  const collo  = parseFloat(misureRec.collo);
  const fianchi= parseFloat(misureRec.fianchi);
  if (!altezza || isNaN(collo) || isNaN(vita)) return null;
  let pct;
  try {
    if (sesso === "M") {
      const log1 = Math.log10(vita - collo);
      const log2 = Math.log10(altezza);
      pct = 495 / (1.0324 - 0.19077 * log1 + 0.15456 * log2) - 450;
    } else {
      if (isNaN(fianchi)) return null;
      const log1 = Math.log10(vita + fianchi - collo);
      const log2 = Math.log10(altezza);
      pct = 495 / (1.29579 - 0.35004 * log1 + 0.22100 * log2) - 450;
    }
    if (pct < 3 || pct > 60) return null;
    return Math.round(pct * 10) / 10;
  } catch { return null; }
}

// Analisi trend peso: regressione lineare semplice
// Restituisce { tdeeAdattivo, settimane, rateKgSettimana, kcalMedie }
function calcolaTDEEAdattivo(misureOrdinateAsc, kcalPianoAttuale) {
  const pesoPunti = misureOrdinateAsc
    .map(r => ({ d: parseDataIT(r.date), v: parseFloat(r.peso) }))
    .filter(x => x.d && !isNaN(x.v));
  if (pesoPunti.length < 2) return null;

  const first = pesoPunti[0], last = pesoPunti[pesoPunti.length - 1];
  const giorniTotali = (last.d - first.d) / 86400000;
  if (giorniTotali < 7) return null; // meno di una settimana, troppo poco

  const settimane = giorniTotali / 7;
  const deltaKg   = last.v - first.v;         // negativo se in calo
  const rateKgSett= deltaKg / settimane;

  // 1 kg grasso ≈ 7700 kcal
  // TDEE_adattivo = kcal_piano + (perdita_settimanale_in_kcal / 7)
  // Se non abbiamo le kcal del piano usiamo 0 (andrà solo il delta)
  const kcal = kcalPianoAttuale || 0;
  const tdeeAdattivo = Math.round(kcal - (rateKgSett * 7700 / 7));

  return { tdeeAdattivo, settimane, rateKgSett, kcalMedie: kcal };
}

// Analisi ricomposizione: peso stabile ma vita scende
function isRicomposizione(misureOrdinateAsc) {
  if (misureOrdinateAsc.length < 3) return false;
  const pesoVals = misureOrdinateAsc.map(r=>parseFloat(r.peso)).filter(v=>!isNaN(v));
  const vitaVals = misureOrdinateAsc.map(r=>parseFloat(r.vita)).filter(v=>!isNaN(v));
  if (pesoVals.length < 3 || vitaVals.length < 3) return false;
  const deltaPeso = pesoVals[pesoVals.length-1] - pesoVals[0];
  const deltaVita = vitaVals[vitaVals.length-1] - vitaVals[0];
  return Math.abs(deltaPeso) < 1.5 && deltaVita < -2; // peso quasi fermo, vita scende
}

// ─── FUNZIONE PRINCIPALE ────────────────────────────────────────────
function calcTargetAdattivo(p, misurePersona) {
  const { peso, altezza, eta, sesso, stile, obiettivo } = p;
  const isChild = eta < 12;
  const mult = (STILI.find(s=>s.key===stile)||STILI[2]).mult;

  // misure ordinate dal più vecchio al più recente
  const recs = (misurePersona||[]).slice().sort((a,b)=>dateToSort(a.date).localeCompare(dateToSort(b.date)));
  const latestRec = recs.length ? recs[recs.length-1] : null;

  // ── STEP 1: Fabbisogno base ─────────────────────────────────────
  // Adulti: metodo LARN/SINU (MB per fascia d'età × LAF). I minori non
  // sono coperti dalla tabella LARN → fallback Mifflin-St Jeor.
  const bmrMifflin = sesso==="M"
    ? 10*peso + 6.25*altezza - 5*eta + 5
    : 10*peso + 6.25*altezza - 5*eta - 161;

  let larnInfo = null;
  let tdeeMifflin;            // nome storico mantenuto per compatibilità display
  if (!isChild) {
    larnInfo = fabbisognoLARN(sesso, eta, peso, stile);
    tdeeMifflin = larnInfo.fabbisogno;        // fabbisogno LARN = MB × LAF
  } else {
    // minori: Mifflin × moltiplicatore stile, come in precedenza
    tdeeMifflin = Math.round(bmrMifflin * mult);
  }

  // ── STEP 2: Affinamento Katch-McArdle se c'è la %grasso ──────────
  // Se disponibile la massa magra, sostituiamo l'MB con quello
  // Katch-McArdle (più preciso su soggetti con composizione nota) e
  // rical­coliamo il fabbisogno con lo stesso LAF della tabella LARN.
  const pctGrasso = !isChild ? stimaGrasso(p, latestRec) : null;
  let bmr = isChild ? bmrMifflin : (larnInfo ? larnInfo.mb : bmrMifflin);
  let usaKatchMcArdle = false;
  if (pctGrasso !== null && !isChild) {
    const pesoDaRec = latestRec && !isNaN(parseFloat(latestRec.peso)) ? parseFloat(latestRec.peso) : peso;
    const lbm = pesoDaRec * (1 - pctGrasso / 100);
    const bmrKM = 370 + 21.6 * lbm;
    bmr = bmrKM;
    usaKatchMcArdle = true;
    // ricalcolo il fabbisogno con MB Katch-McArdle × LAF LARN
    tdeeMifflin = Math.round(bmrKM * (larnInfo ? larnInfo.laf : mult));
  }

  // ── STEP 3: TDEE adattivo da storico peso ────────────────────────
  let tdeeFinale = tdeeMifflin;
  let usaTDEEAdattivo = false;
  let adattivoInfo = null;

  if (!isChild && recs.length >= 2) {
    const pesoPunti = recs.filter(r=>!isNaN(parseFloat(r.peso)));
    if (pesoPunti.length >= 2) {
      const giorniSpan = (() => {
        const d1 = parseDataIT(pesoPunti[0].date);
        const d2 = parseDataIT(pesoPunti[pesoPunti.length-1].date);
        return d1 && d2 ? (d2-d1)/86400000 : 0;
      })();
      if (giorniSpan >= 14) {
        const adattivo = calcolaTDEEAdattivo(pesoPunti, tdeeMifflin);
        if (adattivo && adattivo.tdeeAdattivo > 1000 && adattivo.tdeeAdattivo < 6000) {
          // media pesata: più dati → più peso all'adattivo
          const pesoAdattivo = Math.min(0.85, 0.4 + (adattivo.settimane / 20) * 0.45);
          tdeeFinale = Math.round(tdeeFinale * (1-pesoAdattivo) + adattivo.tdeeAdattivo * pesoAdattivo);
          usaTDEEAdattivo = true;
          adattivoInfo = adattivo;
        }
      }
    }
  }

  // ── STEP 4: Aggiustamento obiettivo ──────────────────────────────
  let deficit = 0;
  let noteObiettivo = "";

  if (!isChild) {
    const ricomposizione = isRicomposizione(recs);
    if (ricomposizione && obiettivo === "perdita") {
      // Ricomposizione in corso: mantieni le calorie, non tagliare
      deficit = Math.round(tdeeFinale * 0.05); // deficit minimo 5%
      noteObiettivo = "ricomposizione";
    } else if (obiettivo === "perdita") {
      // Deficit tra 15% e 22% del TDEE, max 600 kcal
      deficit = Math.min(600, Math.round(tdeeFinale * 0.18));
    } else if (obiettivo === "aumento") {
      deficit = -300;
    }
  }

  const kcal = Math.max(1200, tdeeFinale - deficit);

  // ── STEP 5: Macros ────────────────────────────────────────────────
  // Proteine: dipendono da massa magra se disponibile, altrimenti da peso
  const protMultiplier = stile==="sportivo" ? 2.2 : stile==="molto_attivo" ? 2.0 : 1.8;
  let prot;
  if (!isChild && pctGrasso !== null && latestRec) {
    const pesoDaRec = !isNaN(parseFloat(latestRec.peso)) ? parseFloat(latestRec.peso) : peso;
    const lbm = pesoDaRec * (1 - pctGrasso / 100);
    // Proteine su massa magra: più preciso
    prot = Math.round(lbm * (stile==="sportivo" ? 2.6 : stile==="molto_attivo" ? 2.4 : 2.2));
  } else {
    prot = isChild ? Math.round(peso*1.2) : Math.round(peso * protMultiplier);
  }
  const grassi = Math.round((kcal * 0.28) / 9);
  const carbo  = Math.round((kcal - prot*4 - grassi*9) / 4);

  // ── STEP 6: Confidenza ────────────────────────────────────────────
  let confidenza;
  const nPesoPunti = recs.filter(r=>!isNaN(parseFloat(r.peso))).length;
  if (usaTDEEAdattivo && usaKatchMcArdle) {
    confidenza = CONFIDENZA.OTTIMA;
  } else if (usaTDEEAdattivo) {
    confidenza = CONFIDENZA.ALTA;
  } else if (usaKatchMcArdle) {
    confidenza = CONFIDENZA.MEDIA;
  } else {
    confidenza = CONFIDENZA.BASSA;
  }

  return {
    kcal,
    p: prot,
    c: Math.max(50, carbo),
    g: grassi,
    confidenza,
    // dati di debug/display
    tdeeMifflin,
    tdeeFinale,
    pctGrasso,
    usaTDEEAdattivo,
    usaKatchMcArdle,
    larnInfo,
    adattivoInfo,
    noteObiettivo,
    nMisure: recs.length,
  };
}

function calcTarget(p) { return calcTargetAdattivo(p, []); }

// ═══════════════════════════════════════════════════════════════════
// PIANO PERSONALIZZATO  ·  collega misure → fabbisogno → porzioni
// ═══════════════════════════════════════════════════════════════════
// Per un giorno del piano restituisce i macro di ogni pasto:
//   - se la persona HA misure → quantità riscalate dal motore sul suo
//     fabbisogno (calcolato con LARN dentro calcTargetAdattivo);
//   - se NON ha misure → macro della taglia uomo/donna/bimbo, come
//     prima. L'app resta quindi usabile anche senza misure.
//
// Ritorna { perPasto:{mealKey:{kcal,p,c,g}}, quantita:{mealKey:{ingId..}},
//           personalizzato:bool, tagliaBase, target }.
function pianoPersonalizzato(giornoPiano, persona, misurePersona) {
  const slot = slotForPersona(persona);

  // Pasti del giorno come oggetti ricetta, in ordine.
  const mealKeys = MEAL_KEYS;
  const ricette = mealKeys.map(mk => giornoPiano && giornoPiano[mk]).filter(Boolean);

  // Il piano si personalizza non appena la persona ha i dati di base
  // (peso, età, sesso): bastano per calcolare il fabbisogno con LARN.
  // Le misure (storico peso) sono un affinamento opzionale, usato da
  // calcTargetAdattivo per il TDEE adattivo se presenti.
  const datiValidi = persona
    && Number(persona.peso)    > 0
    && Number(persona.eta)     > 0
    && (persona.sesso === "M" || persona.sesso === "F");

  // Senza dati validi: fallback alle taglie fisse.
  if (!datiValidi) {
    const perPasto = {};
    for (const mk of mealKeys) {
      const meal = giornoPiano && giornoPiano[mk];
      perPasto[mk] = meal && meal[slot] ? meal[slot] : { kcal:0, p:0, c:0, g:0 };
    }
    return { perPasto, quantita:null, personalizzato:false, tagliaBase:slot, target:null };
  }

  // Fabbisogno LARN (+ TDEE adattivo se ci sono misure) + scaling.
  const target = calcTargetAdattivo(persona, misurePersona || []);
  const res = scalaPastiGiorno(ricette, { kcal:target.kcal, p:target.p, c:target.c, g:target.g });

  const perPasto = {};
  for (const mk of mealKeys) {
    const meal = giornoPiano && giornoPiano[mk];
    if (meal && res.perRicetta[meal.id]) {
      perPasto[mk] = macroDaQuantita(res.perRicetta[meal.id]);
    } else if (meal && meal[slot]) {
      // ricetta senza ING_QTY: ricade sulla taglia fissa
      perPasto[mk] = meal[slot];
    } else {
      perPasto[mk] = { kcal:0, p:0, c:0, g:0 };
    }
  }
  return {
    perPasto,
    quantita: res.perRicetta,
    personalizzato: true,
    tagliaBase: res.tagliaBase,
    target,
  };
}

// ─── Slot ricetta per persona ───────────────────────────────────────
// Le ricette hanno solo 3 profili di porzione: uomo / donna / bimbo.
// Qualsiasi persona del nucleo (anche la 4ª, 5ª…) va mappata su uno
// di questi profili in base a età e sesso — NON in base alla posizione
// nell'array, che cambia quando si aggiungono o rimuovono persone.
function slotForPersona(p) {

// ─── Shopping engine ────────────────────────────────────────────────
function formatQty(total, unit) {
  if (unit==="pz") return Math.ceil(total)+" pz";
  if (unit==="cucchiaio"||unit==="cucchiaino"||unit==="qb") return "q.b.";
  if (unit==="ml") {
    if (total>=1000) return (total/1000).toFixed(1).replace(".0","")+" L";
    return (Math.ceil(total/50)*50)+" ml";
  }
  if (total<=50)   return (Math.ceil(total/10)*10)+"g";
  if (total<=200)  return (Math.ceil(total/25)*25)+"g";
  if (total<=500)  return (Math.ceil(total/50)*50)+"g";
  if (total<=1000) return (Math.ceil(total/100)*100)+"g";
  return (Math.ceil(total/500)*500/1000).toFixed(1).replace(".0","")+" kg";
}

// ─── Piano effettivo ────────────────────────────────────────────────
// Fonde il piano grezzo (da seed) con gli override (sostituzioni utente).
// È la FONTE UNICA da cui devono leggere sia la scheda Piano sia la
// scheda Spesa: così le due viste non possono divergere.
// overrides ha chiavi "<dayIdx>-<mealKey>".
function applyOverrides(plan, overrides) {
  if (!overrides || Object.keys(overrides).length === 0) return plan;
  return plan.map((day, di) => {
    let dayCopy = null;
    MEAL_KEYS.forEach(mk => {
      const ov = overrides[`${di}-${mk}`];
      if (ov) {
        if (!dayCopy) dayCopy = { ...day };
        dayCopy[mk] = ov;
      }
    });
    return dayCopy || day;
  });
}

function buildShoppingForDays(plan, selectedDays) {
  const acc = {};
  const addQty = (recipeId, ingId) => {
    const qtyMap = ING_QTY[recipeId];
    const q = qtyMap && qtyMap[ingId];
    if (q) {
      // Quantità nota: somma le porzioni di tutti i profili
      if (!acc[ingId]) acc[ingId] = { total:0, unit:q.unit };
      // Se in precedenza l'ingrediente era "q.b." (total null) lo promuoviamo
      if (acc[ingId].total === null) acc[ingId].total = 0;
      const sum = PERSONAS_KEYS.reduce((s,pk) => s+(q[pk]||0), 0);
      acc[ingId].total += sum;
      acc[ingId].unit = q.unit;
    } else {
      // Quantità non specificata (spezie, erbe, ecc.): entra comunque
      // nella lista come "q.b." così non sparisce dalla spesa.
      if (!acc[ingId]) acc[ingId] = { total:null, unit:"qb" };
    }
  };
  selectedDays.forEach(di => {
    const day = plan[di];
    MEAL_KEYS.forEach(mk => { const meal = day[mk]; meal.ingredients.forEach(ingId => addQty(meal.id, ingId)); });
  });
  const grouped = {};
  const catOrder = ["🥩 Proteine","🥛 Latticini","🍎 Frutta","🥦 Verdure","🫘 Legumi","🌾 Cereali","🥜 Frutta secca","🧂 Dispensa","🛒 Altro"];
  Object.entries(acc).forEach(([ingId,{total,unit}]) => {
    const ing = ING_MAP[ingId]; if (!ing) return;
    const qtyStr = (total===null||unit==="qb"||unit==="cucchiaio"||unit==="cucchiaino") ? "q.b." : formatQty(total,unit);
    if (!grouped[ing.cat]) grouped[ing.cat] = [];
    grouped[ing.cat].push({...ing, qtyStr, rawTotal:total, rawUnit:unit});
  });
  const result = {};
  catOrder.forEach(cat => { if (grouped[cat]) result[cat] = grouped[cat].sort((a,b)=>a.deperibile-b.deperibile); });
  Object.keys(grouped).forEach(cat => { if (!result[cat]) result[cat] = grouped[cat]; });
  return result;
}

// ─── UI Atoms ────────────────────────────────────────────────────────
// ── SwipeContainer ──────────────────────────────────────────────────
// Wrapper che intercetta swipe orizzontali e chiama onSwipeLeft/Right.
// Distingue orizzontale da verticale (60% di delta orizzontale prevalente),
// così non ruba lo scroll della pagina. Soglia 50px per evitare tocchi
// accidentali. Non blocca i click su elementi interni.
function SwipeContainer({ onSwipeLeft, onSwipeRight, children, style }) {
  const stato = React.useRef({ x:0, y:0, t:0, attivo:false });
  const onTouchStart = (e) => {
    const t = e.touches[0];
    stato.current = { x:t.clientX, y:t.clientY, t:Date.now(), attivo:true };
  };
  const onTouchMove = () => { /* lasciamo lo scroll libero */ };
  const onTouchEnd = (e) => {
    if (!stato.current.attivo) return;
    stato.current.attivo = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - stato.current.x;
    const dy = t.clientY - stato.current.y;
    const dt = Date.now() - stato.current.t;
    // gesto valido: orizzontale prevalente, >50px, <600ms
    if (dt > 600) return;
    if (Math.abs(dx) < 50) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.4) return;  // verticale: ignora
    if (dx < 0 && onSwipeLeft)  onSwipeLeft();
    if (dx > 0 && onSwipeRight) onSwipeRight();
  };
  return (
    <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} style={style}>
      {children}
    </div>
  );
}

// ─── WaterTracker ─────────────────────────────────────────────────
const WATER_ML   = 200;   // ml per bicchiere
const WATER_GOAL = 2000;  // ml target giornaliero
const WATER_MAX  = 14;    // bicchieri massimi visualizzati (2800ml)

function WaterTracker({ dayKey, personaColor }) {
  // glasses: numero bicchieri bevuti per questo giorno
  const [glasses, setGlasses] = useState(0);
  const [loaded,  setLoaded]  = useState(false);
  const [bounce,  setBounce]  = useState(null); // indice bicchiere animato

  // Chiave storage per questo giorno
  const storageKey = `${SK_WATER}:${dayKey}`;

  useEffect(() => {
    window.storage.get(storageKey)
      .then(r => setGlasses(Math.min(WATER_MAX, parseInt(r.value) || 0)))
      .catch(() => setGlasses(0))
      .finally(() => setLoaded(true));
  }, [storageKey]);

  const setAndSave = async (n) => {
    const clamped = Math.max(0, Math.min(WATER_MAX, n));
    setGlasses(clamped);
    await window.storage.set(storageKey, String(clamped)).catch(() => {});
  };

  const handleGlassClick = (idx) => {
    // Se clicco il bicchiere già pieno più alto → rimuovi (deseleziona)
    // Se clicco un bicchiere → porta il contatore a idx+1
    const next = idx + 1 === glasses ? idx : idx + 1;
    setBounce(idx);
    setTimeout(() => setBounce(null), 300);
    setAndSave(next);
  };

  const ml       = glasses * WATER_ML;
  const pct      = Math.min(100, Math.round((ml / WATER_GOAL) * 100));
  const goal_ok  = ml >= WATER_GOAL;
  const color    = goal_ok ? "#16a34a" : ml >= 1400 ? "#0891b2" : ml >= 800 ? "#d97706" : "#94a3b8";
  const bgBar    = goal_ok ? "#f0fdf4" : ml >= 1400 ? "#f0f9ff" : ml >= 800 ? "#fffbeb" : "#f8fafc";
  const label    = goal_ok ? "🎉 Obiettivo raggiunto!" : `${WATER_GOAL - ml} ml al traguardo`;

  if (!loaded) return null;

  return (
    <div style={{background:"#fff",borderRadius:12,border:`1.5px solid ${goal_ok?"#bbf7d0":"#e2e8f0"}`,padding:"14px 16px",marginTop:10,transition:"border-color 0.3s"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:18}}>💧</span>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:"#1e293b"}}>Idratazione</div>
            <div style={{fontSize:10,color:"#64748b"}}>Obiettivo: {WATER_GOAL/1000}L · {WATER_ML}ml per bicchiere</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:18,fontWeight:800,color,fontFamily:"monospace"}}>{(ml/1000).toFixed(1)}<span style={{fontSize:11,fontWeight:400,color:"#94a3b8"}}> L</span></div>
          <div style={{fontSize:9,color,fontWeight:700}}>{label}</div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{background:"#f1f5f9",borderRadius:99,height:8,overflow:"hidden",marginBottom:12}}>
        <div style={{
          width:`${pct}%`, height:"100%", borderRadius:99,
          background: goal_ok
            ? "linear-gradient(90deg,#16a34a,#22c55e)"
            : ml>=1400 ? "linear-gradient(90deg,#0891b2,#38bdf8)"
            : ml>=800  ? "linear-gradient(90deg,#d97706,#fbbf24)"
            : "#cbd5e1",
          transition:"width 0.4s cubic-bezier(.4,0,.2,1)"
        }}/>
      </div>

      {/* Griglia bicchieri */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {Array.from({length: WATER_MAX}).map((_, i) => {
          const filled  = i < glasses;
          const isNext  = i === glasses; // il prossimo da riempire
          const anim    = bounce === i;
          return (
            <button
              key={i}
              onClick={() => handleGlassClick(i)}
              style={{
                width:36, height:44,
                borderRadius:8,
                border:`2px solid ${filled ? color+"80" : "#e2e8f0"}`,
                background: filled ? bgBar : "#f8fafc",
                cursor:"pointer",
                display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center",
                gap:1,
                transform: anim ? "scale(1.25)" : isNext ? "scale(1.05)" : "scale(1)",
                transition:"transform 0.15s, background 0.2s, border-color 0.2s",
                outline:"none",
                padding:0,
              }}
            >
              <span style={{fontSize:18,lineHeight:1,filter:filled?"none":"grayscale(1) opacity(0.35)"}}>
                🥛
              </span>
              <span style={{fontSize:7,fontFamily:"monospace",fontWeight:700,color:filled?color:"#cbd5e1"}}>
                {WATER_ML}
              </span>
            </button>
          );
        })}
      </div>

      {/* Hint */}
      <div style={{marginTop:8,fontSize:10,color:"#94a3b8",textAlign:"center"}}>
        Tocca un bicchiere per segnarlo · toccalo di nuovo per rimuoverlo
      </div>
    </div>
  );
}

          <div style={{fontSize:10,fontWeight:800,color:"#1e293b",marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>
            ⏱ Quanto tempo hai?
          </div>
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {PREP_SLOTS.map(s=>(
              <button key={s.max} onClick={()=>setMaxPrep(maxPrep===s.max?null:s.max)}
                style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${maxPrep===s.max?s.color:"#e2e8f0"}`,background:maxPrep===s.max?s.bg:"#fff",color:maxPrep===s.max?s.color:"#64748b",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.15s"}}>
                {s.label}
              </button>
            ))}
          </div>

          {/* Risultati */}
          {maxPrep === null ? (
            <div style={{textAlign:"center",padding:"12px 0",color:"#94a3b8",fontSize:12}}>
              Seleziona il tempo disponibile per vedere le alternative
            </div>
          ) : alternatives.length === 0 ? (
            <div style={{textAlign:"center",padding:"12px 0",color:"#94a3b8",fontSize:12}}>
              Nessuna ricetta disponibile in {maxPrep} minuti 😔<br/>
              <span style={{fontSize:11}}>Prova ad aumentare il tempo o riabilita qualche ingrediente</span>
            </div>
          ) : (
            <div>
              <div style={{fontSize:10,color:"#64748b",marginBottom:8,fontWeight:600}}>
                {alternatives.length} alternative trovate · ordinate per calorie simili
              </div>
              {alternatives.map(alt=>{
                const altM = alt[personaKey];
                const altPrep = alt.prep || 0;
                const altPrepColor = altPrep<=15?"#16a34a":altPrep<=30?"#d97706":"#dc2626";
                const kcalDiff = altM?.kcal - m.kcal;
                const diffColor = Math.abs(kcalDiff)<=50?"#16a34a":Math.abs(kcalDiff)<=100?"#d97706":"#94a3b8";
                return (
                  <div key={alt.id} onClick={()=>{ onSwap(alt); setSwapOpen(false); setMaxPrep(null); }}
                    style={{background:"#fff",borderRadius:10,border:"1.5px solid #e2e8f0",padding:"10px 12px",marginBottom:7,cursor:"pointer",transition:"border-color 0.15s",display:"flex",alignItems:"center",gap:10}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="#7c3aed80"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="#e2e8f0"}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#1e293b",lineHeight:1.3,marginBottom:5}}>{alt.nome}</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontSize:10,fontWeight:700,color:altPrepColor,background:altPrepColor+"18",borderRadius:5,padding:"1px 6px"}}>⏱ {altPrep}'</span>
                        <span style={{fontSize:10,fontFamily:"monospace",fontWeight:700,color:"#1e293b"}}>{altM?.kcal} kcal</span>
                        <span style={{fontSize:10,fontWeight:700,color:diffColor}}>
                          {kcalDiff===0?"=":`${kcalDiff>0?"+":""}${kcalDiff} kcal`}
                        </span>
                        {alt._inWeek && <span style={{fontSize:9,color:"#f97316",background:"#fff7ed",borderRadius:4,padding:"1px 5px",fontWeight:700}}>già in sett.</span>}
                      </div>
                    </div>
                    <div style={{flexShrink:0,width:28,height:28,borderRadius:"50%",background:"#7c3aed10",border:"1.5px solid #7c3aed30",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>→</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TotaleBar({ dayData, personaKey, color, target, macroPerPasto }) {
  // macroPerPasto: se presente (persona con misure), contiene i macro
  // riscalati per ogni mealKey; altrimenti si usa la taglia fissa.
  const tot = MEAL_KEYS.reduce((a,mk)=>{
    const m = (macroPerPasto && macroPerPasto[mk]) || dayData[mk][personaKey];
    return {kcal:a.kcal+m.kcal,p:a.p+m.p,c:a.c+m.c,g:a.g+m.g};
  },{kcal:0,p:0,c:0,g:0});
  const t = target||{kcal:2000,p:150,c:200,g:65};
  return (
    <div style={{background:color+"08",border:`1.5px solid ${color}25`,borderRadius:12,padding:"12px 16px",marginTop:4}}>
      <div style={{fontSize:10,fontWeight:700,color,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Totale giornaliero</div>
      {[{l:"Kcal",v:tot.kcal,m:t.kcal},{l:"Proteine",v:tot.p,m:t.p},{l:"Carbo",v:tot.c,m:t.c},{l:"Grassi",v:tot.g,m:t.g}].map(({l,v,m})=>(
        <div key={l} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
          <span style={{width:58,fontSize:10,color:"#64748b",fontFamily:"monospace"}}>{l}</span>
          <ProgressBar value={v} max={m} color={color}/>
          <span style={{fontSize:10,fontFamily:"monospace",fontWeight:700,minWidth:68,textAlign:"right",color:v>m?"#ef4444":color}}>{v}/{m}</span>
        </div>
      ))}
    </div>
  );
}

// ─── IngredientiPage ─────────────────────────────────────────────────
function IngredientiPage({ excluded, onToggle }) {
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("Tutte");
  const cats = ["Tutte", ...Array.from(new Set(INGREDIENTS.map(i=>i.cat)))];
  const visible = INGREDIENTS.filter(ing => {
    const matchCat = filterCat==="Tutte" || ing.cat===filterCat;
    const matchSearch = ing.nome.toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  });
  const nExcluded = excluded.length;
  return (
    <div>
      <div style={{background:nExcluded>0?"#fef2f2":"#f0fdf4",border:`1px solid ${nExcluded>0?"#fecaca":"#bbf7d0"}`,borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:nExcluded>0?"#dc2626":"#16a34a"}}>
            {nExcluded>0 ? `⚠️ ${nExcluded} ingredient${nExcluded===1?"e":"i"} esclus${nExcluded===1?"o":"i"}` : "✅ Nessun ingrediente escluso"}
          </div>
          <div style={{fontSize:10,color:"#64748b",marginTop:2}}>Le ricette con ingredienti esclusi non verranno proposte</div>
        </div>
        {nExcluded>0&&<button onClick={()=>excluded.forEach(id=>onToggle(id))} style={{fontSize:10,color:"#dc2626",background:"none",border:"1px solid #fecaca",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontWeight:700}}>Riabilita tutti</button>}
      </div>
      <div style={{background:"#fff",borderRadius:10,border:"1.5px solid #e2e8f0",padding:"10px 14px",marginBottom:12}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cerca ingrediente..."
          style={{width:"100%",padding:"7px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setFilterCat(c)} style={{padding:"4px 10px",borderRadius:6,border:`1.5px solid ${filterCat===c?"#2563eb":"#e2e8f0"}`,background:filterCat===c?"#2563eb":"#f8fafc",color:filterCat===c?"#fff":"#64748b",fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              {c==="Tutte"?"Tutte":c.split(" ").slice(1).join(" ")}
            </button>
          ))}
        </div>
      </div>
      {(()=>{
        const grouped={};
        visible.forEach(ing=>{ if(!grouped[ing.cat]) grouped[ing.cat]=[]; grouped[ing.cat].push(ing); });
        return Object.entries(grouped).map(([cat,items])=>(
          <div key={cat} style={{background:"#fff",borderRadius:12,border:"1.5px solid #e2e8f0",marginBottom:10,overflow:"hidden"}}>
            <div style={{background:"#f8fafc",borderBottom:"1px solid #f1f5f9",padding:"9px 14px",fontWeight:800,fontSize:12,color:"#1e293b",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>{cat}</span>
              <span style={{fontSize:10,color:"#94a3b8"}}>{items.filter(i=>excluded.includes(i.id)).length>0?`${items.filter(i=>excluded.includes(i.id)).length} esclus${items.filter(i=>excluded.includes(i.id)).length===1?"o":"i"}`:""}</span>
            </div>
            <div style={{padding:"4px 14px"}}>
              {items.map((ing,i)=>{
                const isExcl=excluded.includes(ing.id), dc=depColor(ing.deperibile);
                const recCount=Object.values(DB).flat().filter(r=>r.ingredients.includes(ing.id)).length;
                return (
                  <div key={ing.id} onClick={()=>onToggle(ing.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<items.length-1?"1px solid #f8fafc":"none",cursor:"pointer",opacity:isExcl?0.45:1,transition:"opacity 0.2s"}}>
                    <div style={{width:36,height:20,borderRadius:10,background:isExcl?"#e2e8f0":"#22c55e",flexShrink:0,position:"relative",transition:"background 0.2s"}}>
                      <div style={{width:16,height:16,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:isExcl?2:18,transition:"left 0.2s",boxShadow:"0 1px 3px #0003"}}/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:isExcl?"#94a3b8":"#1e293b",textDecoration:isExcl?"line-through":"none"}}>{ing.nome}</div>
                      <div style={{fontSize:10,color:"#94a3b8",marginTop:1,display:"flex",gap:6,flexWrap:"wrap"}}>
                        <span>{recCount} ricett{recCount===1?"a":"e"}</span>
                        <span style={{color:dc,fontWeight:700}}>{ing.deperibile>=365?"stabile":`${ing.deperibile}g`}</span>
                        {ing.stagioni ? (()=>{
                          const m=meseCorrente();
                          const nomiMesi=["","Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
                          const inStag=ing.stagioni.includes(m);
                          return <span style={{color:inStag?"#16a34a":"#f97316",fontWeight:700}}>{inStag?"✓ stagione":"⚠ fuori stagione"} · {ing.stagioni.map(x=>nomiMesi[x]).join(" ")}</span>;
                        })() : <span>tutto l'anno</span>}
                      </div>
                    </div>
                    {isExcl&&<span style={{fontSize:10,background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:5,padding:"2px 6px",fontWeight:700}}>Escluso</span>}
                  </div>
                );
              })}
            </div>
          </div>
        ));
      })()}
    </div>
  );
}

              <div style={{fontSize:9,color:"#94a3b8",textTransform:"uppercase"}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>onSave(form)} style={{flex:1,padding:"10px",borderRadius:9,border:"none",background:form.color,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{isNew?"➕ Aggiungi":"✓ Salva"}</button>
        <button onClick={onCancel} style={{padding:"10px 16px",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer"}}>Annulla</button>
      </div>
    </div>
  );
}

// ─── Seme composito: base seed + overrides serializzati ──────────────
// Formato: "SEED:123456789" oppure "SEED:123456789|OV:base64(json)"
function encodeSeed(seed, overrides) {
  const hasOverrides = overrides && Object.keys(overrides).length > 0;
  if (!hasOverrides) return String(seed);
  try {
    const ovStr = btoa(unescape(encodeURIComponent(JSON.stringify(overrides))));
    return `${seed}|OV:${ovStr}`;
  } catch { return String(seed); }
}

function decodeSeed(raw) {
  const s = raw.trim();
  if (!s.includes("|OV:")) {
    const n = parseInt(s, 10);
    return isNaN(n) || n <= 0 ? null : { seed: n, overrides: {} };
  }
  try {
    const [seedPart, ovPart] = s.split("|OV:");
    const seed = parseInt(seedPart, 10);
    if (isNaN(seed) || seed <= 0) return null;
    const overrides = JSON.parse(decodeURIComponent(escape(atob(ovPart))));
    return { seed, overrides };
  } catch { return null; }
}

// ─── SeedSyncSection ─────────────────────────────────────────────────
function SeedSyncSection({ currentSeed, overrides, onApplySeed }) {
  const [inputSeed, setInputSeed] = useState("");
  const [copied, setCopied]       = useState(false);
  const [applied, setApplied]     = useState(false);
  const [error, setError]         = useState("");

  const hasOverrides   = overrides && Object.keys(overrides).length > 0;
  const nOverrides     = hasOverrides ? Object.keys(overrides).length : 0;
  const composite      = encodeSeed(currentSeed, overrides);

  const handleCopy = () => {
    const text = composite;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
    } else {
      const el=document.createElement("textarea"); el.value=text; document.body.appendChild(el); el.select(); document.execCommand("copy"); document.body.removeChild(el);
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }
  };

  const handleApply = () => {
    const decoded = decodeSeed(inputSeed);
    if (!decoded) { setError("Seme non valido."); return; }
    setError("");
    onApplySeed(decoded.seed, decoded.overrides);
    setInputSeed(""); setApplied(true); setTimeout(()=>setApplied(false),2500);
  };

  return (
    <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e2e8f0",padding:"16px",marginBottom:16,boxShadow:"0 2px 10px #0000000a"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <span style={{fontSize:20}}>🔗</span>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:"#1e293b"}}>Sincronizzazione piano</div>
          <div style={{fontSize:10,color:"#64748b",marginTop:1}}>Condividi il seme per avere lo stesso piano su tutti i dispositivi</div>
        </div>
      </div>

      {/* Seme attivo */}
      <div style={{background:"#f8fafc",borderRadius:10,border:"1.5px solid #e2e8f0",padding:"12px 14px",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8}}>🌱 Seme attivo</div>
          {hasOverrides && (
            <div style={{fontSize:10,fontWeight:700,color:"#7c3aed",background:"#f5f3ff",borderRadius:5,padding:"2px 8px",border:"1px solid #ddd6fe"}}>
              {nOverrides} pasto{nOverrides>1?"i":""} modificato{nOverrides>1?"i":""}
            </div>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,fontFamily:"monospace",fontSize:hasOverrides?11:17,fontWeight:800,color:"#1e293b",letterSpacing:hasOverrides?0:1,wordBreak:"break-all",lineHeight:1.4}}>
            {hasOverrides ? (
              <>
                <span style={{fontSize:15,letterSpacing:1}}>{currentSeed}</span>
                <span style={{fontSize:9,color:"#7c3aed",display:"block",marginTop:2,fontWeight:600}}>+ {nOverrides} sostituzion{nOverrides>1?"i":"e"} incluse nel seme</span>
              </>
            ) : String(currentSeed)}
          </div>
          <button onClick={handleCopy} style={{flexShrink:0,padding:"9px 14px",borderRadius:8,border:"none",background:copied?"#16a34a":"#2563eb",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",transition:"background 0.2s",whiteSpace:"nowrap"}}>
            {copied?"✓ Copiato!":"📋 Copia"}
          </button>
        </div>
        <div style={{marginTop:8,fontSize:10,color:"#94a3b8",lineHeight:1.5}}>
          {hasOverrides
            ? "Il seme include le tue sostituzioni manuali — chi lo riceve vedrà lo stesso piano identico."
            : "Invia questo numero agli altri membri per sincronizzare il piano."}
        </div>
      </div>

      {/* Inserisci seme */}
      <div>
        <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>📥 Inserisci seme ricevuto</div>
        <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
          <input value={inputSeed} onChange={e=>{setInputSeed(e.target.value);setError("");}}
            onKeyDown={e=>e.key==="Enter"&&handleApply()}
            placeholder="Incolla il seme ricevuto..."
            style={{flex:1,padding:"10px 12px",border:`1.5px solid ${error?"#ef4444":"#e2e8f0"}`,borderRadius:9,fontSize:13,fontFamily:"monospace",outline:"none",boxSizing:"border-box",color:"#1e293b"}}/>
          <button onClick={handleApply} disabled={!inputSeed.trim()}
            style={{flexShrink:0,padding:"10px 16px",borderRadius:9,border:"none",background:!inputSeed.trim()?"#e2e8f0":applied?"#16a34a":"#2563eb",color:!inputSeed.trim()?"#94a3b8":"#fff",fontWeight:700,fontSize:12,cursor:!inputSeed.trim()?"not-allowed":"pointer",transition:"all 0.2s",whiteSpace:"nowrap"}}>
            {applied?"✓ Applicato!":"Applica →"}
          </button>
        </div>
        {error&&<div style={{marginTop:6,fontSize:11,color:"#dc2626",fontWeight:600}}>⚠️ {error}</div>}
        {applied&&<div style={{marginTop:6,fontSize:11,color:"#16a34a",fontWeight:600}}>✅ Piano sincronizzato con tutte le modifiche!</div>}
      </div>

      <div style={{marginTop:12,background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"8px 12px",fontSize:10,color:"#92400e",lineHeight:1.6}}>
        💡 <strong>Funziona offline:</strong> stesso seme = stesso piano identico per tutta la famiglia, sostituzioni incluse.
      </div>
    </div>
  );
}
