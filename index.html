// ─── localStorage storage shim (sostituisce window.storage della Claude artifact API) ───
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem("pa__" + key);
    if (v === null) throw new Error("Key not found: " + key);
    return { key, value: v };
  },
  set: async (key, value) => {
    localStorage.setItem("pa__" + key, value);
    return { key, value };
  },
  delete: async (key) => {
    localStorage.removeItem("pa__" + key);
    return { key, deleted: true };
  },
  list: async (prefix = "") => {
    const keys = Object.keys(localStorage)
      .filter(k => k.startsWith("pa__" + prefix))
      .map(k => k.slice(4));
    return { keys };
  }
};
</script>

function MisurePage({ personas, myPersonaId }) {

  const [selPid, setSelPid]     = useState(myPersonaId || (personas[0]?.id));
  const [form, setForm]         = useState({petto:"",vita:"",fianchi:"",coscia:"",polpaccio:""});

  const [loaded, setLoaded]     = useState(false);

  },[]);

    await window.storage.set(SK_MISURE, JSON.stringify(next)).catch(()=>{});
  };

    setFormDate(rec.date);
    setEditIdx(idx);
    setAdding(true);
  };

  const handleSave = async () => {
    const entry = { date:formDate, ...Object.fromEntries(MISURE_FIELDS.map(f=>[f.key, form[f.key]===""?"":parseFloat(form[f.key])||""])) };
    const cur = (misure[selPid]||[]).slice();

      const origDate = personaRecords[editIdx].date;

      if (origIdx>=0) cur[origIdx] = entry; else cur.push(entry);
    } else {
      cur.push(entry);

    const next = {...misure, [selPid]: cur};
    await save(next);

    const cur = (misure[selPid]||[]).filter(r => !(r.date===orig.date && JSON.stringify(r)===JSON.stringify(orig)));
    const next = {...misure, [selPid]: cur};
    await save(next);

    if (idx >= records.length-1) return null;
    const cur = parseFloat(records[idx][key]);

    if (isNaN(cur)||isNaN(prev)) return null;
    return (cur-prev).toFixed(1);

          </div>
          {/* Campi misure */}

              </div>

          <div style={{display:"flex",gap:8}}>

            const vals = personaRecords.slice(0,6).map(r=>parseFloat(r[f.key])).filter(v=>!isNaN(v));
            if (vals.length < 2) return null;

                <div style={{display:"flex",gap:2,alignItems:"flex-end",height:32}}>
                  {[...vals].reverse().map((v,i)=>{
                    const h = Math.max(4, Math.round(((v-mn)/range)*28)+4);

                    return <div key={i} style={{flex:1,height:h,background:isLast?f.color:f.color+"55",borderRadius:"3px 3px 0 0",transition:"height 0.3s"}}/>;
                  })}

// ─── Utilities ───────────────────────────────────────────────────────
function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function generateWeekPlan(seed, excludedIds = []) {
  const rng = seededRng(seed);
  const avail = cat => DB[cat].filter(r => !r.ingredients.some(id => excludedIds.includes(id)));
  const pickSeven = (cat) => {
    const pool = avail(cat);
    if (!pool.length) return DB[cat].slice(0, 7);
    const picked = [], used = new Set();
    while (picked.length < 7) {
      const idx = Math.floor(rng() * pool.length);
      if (!used.has(idx) || used.size >= pool.length) { used.add(idx); picked.push(pool[idx % pool.length]); }
      if (picked.length >= pool.length) { picked.push(pool[Math.floor(rng() * pool.length)]); }
      if (picked.length >= 7) break;
    }
    return picked.slice(0, 7);
  };
  const cols = pickSeven("colazione"), pranzi = pickSeven("pranzo"), cene = pickSeven("cena");
  const sPool = avail("spuntino").length ? avail("spuntino") : DB.spuntino;
  const spuntini = [];
  for (let i = 0; i < 14; i++) {
    const excl = spuntini.slice(-2).map(s => s.id);
    const pool = sPool.filter(s => !excl.includes(s.id));
    spuntini.push(pool[Math.floor(rng() * pool.length)]);
  }
  return DAYS.map((day, i) => ({ day, colazione:cols[i], spuntino_m:spuntini[i*2], pranzo:pranzi[i], spuntino_p:spuntini[i*2+1], cena:cene[i] }));
}

function calcTarget(p) {
  const { peso, altezza, eta, sesso, stile, obiettivo } = p;
  const bmr = sesso==="M" ? 10*peso+6.25*altezza-5*eta+5 : 10*peso+6.25*altezza-5*eta-161;
  const mult = (STILI.find(s=>s.key===stile)||STILI[2]).mult;
  const tdee = Math.round(bmr * mult);
  const isChild = eta < 12;
  let deficit = 0;
  if (obiettivo==="perdita" && !isChild) deficit = Math.min(500, Math.round(tdee*0.18));
  if (obiettivo==="aumento" && !isChild) deficit = -300;
  const kcal = Math.max(1200, tdee - deficit);
  const protMultiplier = stile==="sportivo" ? 2.2 : stile==="molto_attivo" ? 2.0 : 1.8;
  const prot = isChild ? Math.round(peso*1.2) : Math.round(peso*protMultiplier);
  const grassi = Math.round((kcal*0.28)/9);
  const carbo = Math.round((kcal - prot*4 - grassi*9)/4);
  return { kcal, p:prot, c:Math.max(50,carbo), g:grassi };
}

function emojiBySesso(p) {
  if (p.eta < 12) return p.sesso==="M" ? "👦" : "👧";
  if (p.eta > 60) return p.sesso==="M" ? "👴" : "👵";
  return p.sesso==="M" ? "👨" : "👩";
}

// ─── Shopping engine ────────────────────────────────────────────────
function formatQty(total, unit) {
  if (unit==="pz") return Math.ceil(total)+" pz";
  if (unit==="cucchiaio"||unit==="cucchiaino"||unit==="qb") return "q.b.";
  if (unit==="ml") {
    if (total>=1000) return (total/1000).toFixed(1).replace(".0","")+" L";
    return (Math.ceil(total/50)*50)+" ml";
  }
  if (total<=50)   return (Math.ceil(total/10)*10)+"g";
  if (total<=200)  return (Math.ceil(total/25)*25)+"g";
  if (total<=500)  return (Math.ceil(total/50)*50)+"g";
  if (total<=1000) return (Math.ceil(total/100)*100)+"g";
  return (Math.ceil(total/500)*500/1000).toFixed(1).replace(".0","")+" kg";
}

function buildShoppingForDays(plan, selectedDays) {
  const acc = {};
  const addQty = (recipeId, ingId) => {
    const qtyMap = ING_QTY[recipeId];
    if (!qtyMap || !qtyMap[ingId]) return;
    const q = qtyMap[ingId];
    if (!acc[ingId]) acc[ingId] = { total:0, unit:q.unit };
    const sum = PERSONAS_KEYS.reduce((s,pk) => s+(q[pk]||0), 0);
    acc[ingId].total += sum; acc[ingId].unit = q.unit;
  };
  selectedDays.forEach(di => {
    const day = plan[di];
    MEAL_KEYS.forEach(mk => { const meal = day[mk]; meal.ingredients.forEach(ingId => addQty(meal.id, ingId)); });
  });
  ["ing_evo","ing_spezie","ing_brodo"].forEach(id => { if (!acc[id]) acc[id] = { total:null, unit:"qb" }; });
  const grouped = {};
  const catOrder = ["🥩 Proteine","🥛 Latticini","🍎 Frutta","🥦 Verdure","🫘 Legumi","🌾 Cereali","🥜 Frutta secca","🧂 Dispensa"];
  Object.entries(acc).forEach(([ingId,{total,unit}]) => {
    const ing = ING_MAP[ingId]; if (!ing) return;
    const qtyStr = (total===null||unit==="qb"||unit==="cucchiaio"||unit==="cucchiaino") ? "q.b." : formatQty(total,unit);
    if (!grouped[ing.cat]) grouped[ing.cat] = [];
    grouped[ing.cat].push({...ing, qtyStr, rawTotal:total, rawUnit:unit});
  });
  const result = {};
  catOrder.forEach(cat => { if (grouped[cat]) result[cat] = grouped[cat].sort((a,b)=>a.deperibile-b.deperibile); });
  Object.keys(grouped).forEach(cat => { if (!result[cat]) result[cat] = grouped[cat]; });
  return result;
}

function depColor(days) {
  if (days<=3) return "#ef4444"; if (days<=7) return "#f97316";
  if (days<=14) return "#eab308"; return "#22c55e";
}
function depLabel(days) {
  if (days<=14) return `${days}g`; return "Stabile";
}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>onSave(form)} style={{flex:1,padding:"10px",borderRadius:9,border:"none",background:form.color,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{isNew?"➕ Aggiungi":"✓ Salva"}</button>
        <button onClick={onCancel} style={{padding:"10px 16px",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer"}}>Annulla</button>
      </div>
    </div>
  );
}

// ─── SeedSyncSection ─────────────────────────────────────────────────
function SeedSyncSection({ currentSeed, onApplySeed }) {
  const [inputSeed, setInputSeed] = useState("");
  const [copied, setCopied] = useState(false);
  const [applied, setApplied] = useState(false);
  const [error, setError] = useState("");
  const handleCopy = () => {
    const text = String(currentSeed);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
    } else {
      const el=document.createElement("textarea"); el.value=text; document.body.appendChild(el); el.select(); document.execCommand("copy"); document.body.removeChild(el);
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }
  };
  const handleApply = () => {
    const parsed = parseInt(inputSeed.trim(), 10);
    if (isNaN(parsed)||parsed<=0) { setError("Seme non valido. Deve essere un numero intero positivo."); return; }
    setError(""); onApplySeed(parsed); setInputSeed(""); setApplied(true); setTimeout(()=>setApplied(false),2500);
  };
  return (
    <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e2e8f0",padding:"16px",marginBottom:16,boxShadow:"0 2px 10px #0000000a"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <span style={{fontSize:20}}>🔗</span>
        <div><div style={{fontSize:13,fontWeight:800,color:"#1e293b"}}>Sincronizzazione piano</div><div style={{fontSize:10,color:"#64748b",marginTop:1}}>Condividi il seme per avere lo stesso piano su tutti i dispositivi</div></div>
      </div>
      <div style={{background:"#f8fafc",borderRadius:10,border:"1.5px solid #e2e8f0",padding:"12px 14px",marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>🌱 Seme attivo</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1,fontFamily:"monospace",fontSize:17,fontWeight:800,color:"#1e293b",letterSpacing:1,wordBreak:"break-all"}}>{String(currentSeed)}</div>
          <button onClick={handleCopy} style={{flexShrink:0,padding:"9px 14px",borderRadius:8,border:"none",background:copied?"#16a34a":"#2563eb",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",transition:"background 0.2s",whiteSpace:"nowrap"}}>
            {copied?"✓ Copiato!":"📋 Copia"}
          </button>
        </div>
        <div style={{marginTop:8,fontSize:10,color:"#94a3b8",lineHeight:1.5}}>Invia questo numero agli altri membri per sincronizzare il piano.</div>
      </div>
      <div>
        <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>📥 Inserisci seme ricevuto</div>
        <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
          <input value={inputSeed} onChange={e=>{setInputSeed(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&handleApply()}
            placeholder="Incolla o digita il seme..." inputMode="numeric"
            style={{flex:1,padding:"10px 12px",border:`1.5px solid ${error?"#ef4444":"#e2e8f0"}`,borderRadius:9,fontSize:14,fontFamily:"monospace",outline:"none",boxSizing:"border-box",color:"#1e293b"}}/>
          <button onClick={handleApply} disabled={!inputSeed.trim()} style={{flexShrink:0,padding:"10px 16px",borderRadius:9,border:"none",background:!inputSeed.trim()?"#e2e8f0":applied?"#16a34a":"#2563eb",color:!inputSeed.trim()?"#94a3b8":"#fff",fontWeight:700,fontSize:12,cursor:!inputSeed.trim()?"not-allowed":"pointer",transition:"all 0.2s",whiteSpace:"nowrap"}}>
            {applied?"✓ Applicato!":"Applica →"}
          </button>
        </div>
        {error&&<div style={{marginTop:6,fontSize:11,color:"#dc2626",fontWeight:600}}>⚠️ {error}</div>}
        {applied&&<div style={{marginTop:6,fontSize:11,color:"#16a34a",fontWeight:600}}>✅ Piano sincronizzato!</div>}
      </div>
      <div style={{marginTop:12,background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"8px 12px",fontSize:10,color:"#92400e",lineHeight:1.6}}>
        💡 <strong>Funziona offline:</strong> stesso seme = stesso piano per tutta la famiglia, senza internet.
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────
function App() {
  const [page, setPage]               = useState("piano");
  const [selDay, setSelDay]           = useState(todayDayIndex());
  const [selPersonaId, setSelPersonaId] = useState(null);
  const [myPersonaId, setMyPersonaId] = useState(null);
  const [seed, setSeed]               = useState(null);
  const [history, setHistory]         = useState([]);
  const [plan, setPlan]               = useState(null);
  const [excluded, setExcluded]       = useState([]);
  const [personas, setPersonas]       = useState(DEFAULT_PERSONAS);
  const [spinning, setSpinning]       = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [regenNeeded, setRegenNeeded] = useState(false);

  useEffect(()=>{
    async function load(){
      try {
        const [sS,hS,eS,pS,mS] = await Promise.allSettled([
          window.storage.get(SK_SEED), window.storage.get(SK_HISTORY), window.storage.get(SK_EXCL),
          window.storage.get(SK_PERSONAS), window.storage.get(SK_MY_PERSONA),
        ]);
        const loadedSeed = sS.status==="fulfilled"&&sS.value ? parseInt(sS.value.value) : Date.now();
        const loadedHist = hS.status==="fulfilled"&&hS.value ? JSON.parse(hS.value.value) : [];
        const loadedExcl = eS.status==="fulfilled"&&eS.value ? JSON.parse(eS.value.value) : [];
        const loadedPers = pS.status==="fulfilled"&&pS.value ? JSON.parse(pS.value.value) : DEFAULT_PERSONAS;
        const loadedMyP  = mS.status==="fulfilled"&&mS.value ? mS.value.value : loadedPers[0].id;
        const validMyP   = loadedPers.find(p=>p.id===loadedMyP) ? loadedMyP : loadedPers[0].id;
        setSeed(loadedSeed); setHistory(loadedHist); setExcluded(loadedExcl);
        setPersonas(loadedPers); setSelPersonaId(loadedPers[0].id); setMyPersonaId(validMyP);
        setPlan(generateWeekPlan(loadedSeed, loadedExcl));
      } catch {
        const ns=Date.now(); setSeed(ns); setPersonas(DEFAULT_PERSONAS);
        setSelPersonaId(DEFAULT_PERSONAS[0].id); setMyPersonaId(DEFAULT_PERSONAS[0].id);
        setPlan(generateWeekPlan(ns,[]));
      }
    }
    load();
  },[]);

  const handleUpdatePersona = useCallback((updated)=>{
    setPersonas(prev=>{ const next=prev.map(p=>p.id===updated.id?updated:p); window.storage.set(SK_PERSONAS,JSON.stringify(next)).catch(()=>{}); return next; });
  },[]);

  const handleAddPersona = useCallback((p)=>{
    setPersonas(prev=>{ const next=[...prev,p]; window.storage.set(SK_PERSONAS,JSON.stringify(next)).catch(()=>{}); return next; });
    setSelPersonaId(p.id);
  },[]);

  const handleDeletePersona = useCallback((id)=>{
    setPersonas(prev=>{ const next=prev.filter(p=>p.id!==id); window.storage.set(SK_PERSONAS,JSON.stringify(next)).catch(()=>{}); if(selPersonaId===id) setSelPersonaId(next[0]?.id||null); return next; });
  },[selPersonaId]);

  const handleSetMyPersona = useCallback((id)=>{ setMyPersonaId(id); setSelPersonaId(id); window.storage.set(SK_MY_PERSONA,id).catch(()=>{}); },[]);

  const handleApplySeed = useCallback(async(newSeed)=>{
    setSpinning(true); await new Promise(r=>setTimeout(r,400));
    const np=generateWeekPlan(newSeed,excluded);
    const nh=[{seed,date:new Date().toLocaleDateString("it-IT"),label:`Piano del ${new Date().toLocaleDateString("it-IT")}`},...history].slice(0,5);
    setSeed(newSeed); setPlan(np); setHistory(nh); setSelDay(0); setRegenNeeded(false);
    try { await window.storage.set(SK_SEED,String(newSeed)); await window.storage.set(SK_HISTORY,JSON.stringify(nh)); } catch{}
    setSpinning(false);
  },[seed,history,excluded]);

  const regenerate = useCallback(async()=>{
    setSpinning(true); await new Promise(r=>setTimeout(r,500));
    const ns=Date.now(), np=generateWeekPlan(ns,excluded);
    const nh=[{seed,date:new Date().toLocaleDateString("it-IT"),label:`Piano del ${new Date().toLocaleDateString("it-IT")}`},...history].slice(0,5);
    setSeed(ns); setPlan(np); setHistory(nh); setSelDay(0); setRegenNeeded(false);
    try { await window.storage.set(SK_SEED,String(ns)); await window.storage.set(SK_HISTORY,JSON.stringify(nh)); } catch{}
    setSpinning(false);
  },[seed,history,excluded]);

  const loadHistory = useCallback(async(oldSeed)=>{
    setSpinning(true); await new Promise(r=>setTimeout(r,300));
    setSeed(oldSeed); setPlan(generateWeekPlan(oldSeed,excluded)); setSelDay(0); setShowHistory(false);
    try { await window.storage.set(SK_SEED,String(oldSeed)); } catch{}
    setSpinning(false);
  },[excluded]);

  const toggleExcluded = useCallback(async(id)=>{
    setExcluded(prev=>{ const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]; window.storage.set(SK_EXCL,JSON.stringify(next)).catch(()=>{}); return next; });
    setRegenNeeded(true);
  },[]);

  if (!plan||!personas.length) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:12}}>🥗</div><div>Caricamento...</div></div>
    </div>
  );

  const persona = personas.find(p=>p.id===selPersonaId)||personas.find(p=>p.id===myPersonaId)||personas[0];
  const personaTarget = calcTarget(persona);
  const dayData = plan[selDay];
  const SLOT_KEYS = ["uomo","donna","bimbo"];
  const personaSlot = SLOT_KEYS[Math.min(personas.indexOf(persona),2)];

  const TABS = [{key:"piano",label:"📋 Piano"},{key:"spesa",label:"🛒 Spesa"},{key:"ingredienti",label:"🥦 Ingredienti"},{key:"misure",label:"📏 Misure"},{key:"famiglia",label:"👥 Famiglia"}];
  const TAB_ICONS = { piano:"📋", spesa:"🛒", ingredienti:"🥦", misure:"📏", famiglia:"👥" };
  const TAB_SHORT = { piano:"Piano", spesa:"Spesa", ingredienti:"Ingredienti", misure:"Misure", famiglia:"Famiglia" };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f8fafc 0%,#f1f5f9 100%)",fontFamily:"'Segoe UI',system-ui,sans-serif",paddingBottom:80}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(90deg,#1e293b 0%,#334155 100%)",padding:"20px 20px 16px",paddingTop:"calc(20px + env(safe-area-inset-top,0px))"}}>
        <div style={{maxWidth:680,margin:"0 auto"}}>
          <div style={{fontSize:9,color:"#94a3b8",letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>Piano Alimentare Familiare</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:14}}>
            <div style={{fontSize:19,fontWeight:800,color:"#f8fafc",letterSpacing:-0.5}}>
              {personas.length} {personas.length===1?"persona":"persone"} · 7 giorni
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {regenNeeded&&<span style={{fontSize:10,color:"#fbbf24",fontWeight:700,background:"#78350f40",borderRadius:5,padding:"2px 6px"}}>⚠ Rigenera</span>}
              <button onClick={regenerate} disabled={spinning} style={{display:"flex",alignItems:"center",gap:6,background:spinning?"#334155":"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",border:"none",borderRadius:9,padding:"8px 14px",fontWeight:700,fontSize:11,cursor:spinning?"not-allowed":"pointer",boxShadow:spinning?"none":"0 4px 14px #2563eb55",transition:"all 0.2s"}}>
                <span style={{display:"inline-block",animation:spinning?"spin 0.7s linear infinite":"none",fontSize:13}}>🔄</span>
                {spinning?"...":"Nuovo piano"}
              </button>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
            <span style={{fontSize:13,color:"#e2e8f0",fontWeight:700}}>{TABS.find(t=>t.key===page)?.label||""}</span>
            {history.length>0&&<button onClick={()=>setShowHistory(h=>!h)} style={{marginLeft:"auto",flexShrink:0,padding:"4px 10px",borderRadius:6,border:"none",background:showHistory?"#fff":"rgba(255,255,255,0.15)",color:showHistory?"#1e293b":"#e2e8f0",fontWeight:700,fontSize:11,cursor:"pointer"}}>🕐 Storico</button>}
          </div>
          {page==="piano"&&!showHistory&&(
            <div style={{display:"flex",gap:7,marginTop:12,flexWrap:"wrap"}}>
              {personas.map(p=>{
                const t=calcTarget(p);
                return (
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:5,background:"#ffffff12",borderRadius:7,padding:"3px 10px",border:`1px solid ${p.color}50`}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:p.color}}/>
                    <span style={{color:"#e2e8f0",fontSize:11}}>{emojiBySesso(p)} {p.nome}</span>
                    <span style={{color:p.color,fontSize:11,fontFamily:"monospace",fontWeight:700}}>{t.kcal}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"18px 16px 0"}}>
        {/* STORICO */}
        {showHistory&&(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#1e293b",marginBottom:12}}>🕐 Piani precedenti</div>
            {history.map((h,i)=>(
              <div key={i} onClick={()=>loadHistory(h.seed)} style={{background:"#fff",borderRadius:10,border:"1.5px solid #e2e8f0",padding:"12px 16px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div><div style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>{h.label}</div><div style={{fontSize:10,color:"#94a3b8",fontFamily:"monospace"}}>seed: {h.seed}</div></div>
                <span style={{fontSize:12,color:"#2563eb",fontWeight:700}}>Ricarica →</span>
              </div>
            ))}
          </div>
        )}

        {/* PIANO */}
        {!showHistory&&page==="piano"&&(
          <>
            <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
              {personas.map(p=>{
                const isMe=myPersonaId===p.id;
                return (
                  <button key={p.id} onClick={()=>setSelPersonaId(p.id)} style={{flexShrink:0,padding:"8px 14px",borderRadius:10,border:"2px solid",borderColor:selPersonaId===p.id?p.color:"#e2e8f0",background:selPersonaId===p.id?p.color+"12":"#fff",color:selPersonaId===p.id?p.color:"#64748b",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
                    {emojiBySesso(p)} {p.nome}
                    {isMe&&<span style={{fontSize:9,background:p.color,color:"#fff",borderRadius:4,padding:"1px 5px",fontWeight:900}}>IO</span>}
                  </button>
                );
              })}
            </div>
            <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
              {DAYS.map((d,i)=>(
                <button key={d} onClick={()=>setSelDay(i)} style={{flexShrink:0,padding:"6px 10px",borderRadius:8,border:"2px solid",borderColor:selDay===i?persona.color:"#e2e8f0",background:selDay===i?persona.color:"#fff",color:selDay===i?"#fff":"#64748b",fontWeight:700,fontSize:11,cursor:"pointer",transition:"all 0.2s"}}>
                  {d.slice(0,3)}
                </button>
              ))}
            </div>
            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"7px 11px",marginBottom:12,fontSize:11,color:"#92400e"}}>
              💡 Tocca ogni pasto per le porzioni · <strong>Nuovo piano</strong> per variare
            </div>
            {spinning ? <div style={{textAlign:"center",padding:"40px 0",color:"#64748b"}}>🔄 Generando...</div> : (
              <>
                {MEAL_KEYS.map(mk=><MealCard key={mk} mealKey={mk} meal={dayData[mk]} personaKey={personaSlot} color={persona.color}/>)}
                <TotaleBar dayData={dayData} personaKey={personaSlot} color={persona.color} target={personaTarget}/>
                <div style={{marginTop:14,background:"#fff",borderRadius:12,border:"1.5px solid #e2e8f0",padding:"12px 16px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#64748b",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>
                    Target calcolato — {emojiBySesso(persona)} {persona.nome}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[{label:"Calorie",val:personaTarget.kcal,unit:"kcal"},{label:"Proteine",val:personaTarget.p,unit:"g/die"},{label:"Carboidrati",val:personaTarget.c,unit:"g/die"},{label:"Grassi",val:personaTarget.g,unit:"g/die"}].map(({label,val,unit})=>(
                      <div key={label} style={{background:persona.color+"08",borderRadius:8,padding:"8px 12px",border:`1px solid ${persona.color}20`}}>
                        <div style={{fontSize:9,color:"#94a3b8",marginBottom:2,textTransform:"uppercase",letterSpacing:0.8}}>{label}</div>
                        <div style={{fontSize:16,fontWeight:800,color:persona.color,fontFamily:"monospace"}}>{val}<span style={{fontSize:10,fontWeight:400,marginLeft:2}}>{unit}</span></div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{marginTop:14,fontSize:10,color:"#94a3b8",textAlign:"center",lineHeight:1.8}}>
                  DB: {DB.colazione.length} colazioni · {DB.pranzo.length} pranzi · {DB.cena.length} cene · {DB.spuntino.length} spuntini<br/>
                  Valori indicativi. Consulta un nutrizionista per un piano preciso.
                </div>
              </>
            )}
          </>
        )}

        {!showHistory&&page==="spesa"&&<ShoppingPage plan={plan}/>}
        {!showHistory&&page==="ingredienti"&&<IngredientiPage excluded={excluded} onToggle={toggleExcluded}/>}
        {!showHistory&&page==="misure"&&<MisurePage personas={personas} myPersonaId={myPersonaId}/>}
        {!showHistory&&page==="famiglia"&&(
          <FamigliaPage personas={personas} onUpdate={handleUpdatePersona} onAdd={handleAddPersona} onDelete={handleDeletePersona}
            currentSeed={seed} onApplySeed={handleApplySeed} myPersonaId={myPersonaId} onSetMyPersona={handleSetMyPersona}/>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"#fff",borderTop:"1px solid #e2e8f0",display:"flex",alignItems:"stretch",boxShadow:"0 -4px 20px #0000001a",paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {TABS.map(tab=>{
          const active=page===tab.key&&!showHistory;
          return (
            <button key={tab.key} onClick={()=>{setPage(tab.key);setShowHistory(false);}}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"8px 4px 6px",border:"none",background:"transparent",color:active?"#2563eb":"#94a3b8",cursor:"pointer",position:"relative",transition:"color 0.15s",gap:2}}>
              {active&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:2,background:"#2563eb",borderRadius:"0 0 3px 3px"}}/>}
              <span style={{fontSize:18,lineHeight:1}}>{TAB_ICONS[tab.key]}</span>
              <span style={{fontSize:tab.key==="ingredienti"||tab.key==="famiglia"?8:10,fontWeight:active?800:600,letterSpacing:0.2}}>{TAB_SHORT[tab.key]}</span>
              {tab.key==="ingredienti"&&excluded.length>0&&(
                <div style={{position:"absolute",top:6,left:"50%",marginLeft:4,width:14,height:14,background:"#ef4444",borderRadius:"50%",fontSize:8,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>{excluded.length}</div>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

// Register service worker for offline support
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(reg => console.log("SW registered:", reg.scope))
      .catch(err => console.log("SW error:", err));
  });
}
</script>
</body>
</html>
