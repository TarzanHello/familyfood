// ─── RecipeEditorModal ───────────────────────────────────────────────
// Popup per modificare una ricetta: nome, ingredienti, quantità.
// Calcola i macro live e salva come ricetta custom.
//
// La struttura ingredienti interna usa { ingId: { valore, unit } }
// compatibile con macroDaQuantita() e formattaPorzione().

const UNIT_OPTIONS = ["g", "ml", "pz", "cucchiaio", "cucchiaino"];

function ingQtyToEditor(ricettaId, personaKey) {
  // Converte ING_QTY[id] nel formato editor { ingId: {valore, unit} }
  const qty = ING_QTY[ricettaId];
  if (!qty) return {};
  const result = {};
  for (const [ingId, q] of Object.entries(qty)) {
    const slot = personaKey || "uomo";
    const valore = q[slot] ?? q.uomo ?? 0;
    result[ingId] = { valore: Number(valore), unit: q.unit || "g" };
  }
  return result;
}

function calcMacroEditor(ingredienti) {
  // Calcola macro totali da { ingId: {valore, unit} }
  return macroDaQuantita(ingredienti);
}

function RecipeEditorModal({ meal, mealKey, personaKey, onSave, onClose, quantitaScalate }) {
  // quantitaScalate: { ingId: {valore, unit} } già ottimizzate dal motore per questa persona.
  // Se presenti le usiamo come punto di partenza (preservano intensità dieta).
  // Altrimenti ricadiamo sulle quantità raw di ING_QTY.
  const baseIngQty = React.useMemo(() => {
    if (quantitaScalate && Object.keys(quantitaScalate).length > 0) {
      // Le quantitaScalate di res.perRicetta sono { ingId: { valore, unit } }
      // già nel formato dell'editor — usiamole direttamente.
      return { ...quantitaScalate };
    }
    return ingQtyToEditor(meal.id, personaKey);
  }, [meal.id, personaKey, quantitaScalate]);

  const [nome, setNome]       = React.useState(meal.nome);
  const [ings, setIngs]       = React.useState(baseIngQty);
  const [search, setSearch]       = React.useState("");
  const [showSearch, setShowSearch] = React.useState(false);
  // sostituzione: { ingId: ingId da sostituire } | null
  const [replacing, setReplacing]   = React.useState(null);
  const [replSearch, setReplSearch] = React.useState("");
  // suggerimento titolo dopo sostituzione: stringa | null
  const [suggerisciNome, setSuggerisciNome] = React.useState(null);

  const macro = React.useMemo(() => calcMacroEditor(ings), [ings]);

  // Ingredienti raggruppati per categoria
  const ingList = Object.entries(ings);

  const updateQty = (ingId, field, raw) => {
    const val = field === "unit" ? raw : Math.max(0, parseFloat(raw) || 0);
    setIngs(prev => ({ ...prev, [ingId]: { ...prev[ingId], [field]: val } }));
  };

  const removeIng = ingId => {
    setIngs(prev => { const n = {...prev}; delete n[ingId]; return n; });
  };

  // Sostituisce un ingrediente mantenendo la stessa incidenza calorica
  const replaceIng = (oldIngId, newIngId) => {
    const oldQ = ings[oldIngId];
    if (!oldQ) return;

    // kcal dell'ingrediente originale con la sua quantità attuale
    const oldGrammi  = quantitaInGrammi(oldIngId, oldQ.valore, oldQ.unit);
    const oldKcal    = nutriPerGrammi(oldIngId, oldGrammi).kcal;

    // Densità calorica del nuovo ingrediente (kcal per grammo)
    const newNutri   = (ING_MAP[newIngId]||{}).nutri;
    const kcalPer100g = newNutri ? newNutri.kcal : 100; // fallback 100 kcal/100g
    const kcalPerG   = kcalPer100g / 100;

    // Grammi necessari per avere le stesse kcal
    let newGrammi = kcalPerG > 0 ? Math.round(oldKcal / kcalPerG) : oldGrammi;
    newGrammi = Math.max(5, newGrammi); // minimo 5g

    // Scegli unità: pz se il nuovo ingrediente si conta a pezzi
    const pesoPezzo = PESO_PEZZO[newIngId];
    let newUnit = "g", newValore = newGrammi;
    if (pesoPezzo) {
      // Arrotonda a 0.5 pezzi
      newUnit   = "pz";
      newValore = Math.max(0.5, Math.round((newGrammi / pesoPezzo) * 2) / 2);
    } else if (newIngId === "ing_evo" || (ING_MAP[newIngId]?.tags||[]).includes("olio")) {
      newUnit   = "cucchiaio";
      newValore = Math.max(0.5, Math.round((newGrammi / 10) * 2) / 2);
    }

    setIngs(prev => {
      const n = {...prev};
      delete n[oldIngId];
      n[newIngId] = { valore: newValore, unit: newUnit };
      return n;
    });
    setReplacing(null);
    setReplSearch("");

    // ── Suggerimento aggiornamento titolo ─────────────────────────────
    // Cerca il vecchio ingrediente nel titolo suggerito (o nel titolo corrente)
    // e propone di rimpiazzarlo col nome del nuovo. Accumula sostituzioni multiple.
    setSuggerisciNome(prevSuggestion => {
      // Base: usa il suggerimento pendente se esiste, altrimenti il titolo corrente (nome)
      // Non possiamo accedere a `nome` qui direttamente (closure stale), quindi
      // passiamo attraverso setNome per leggere il valore aggiornato.
      const oldIng = ING_MAP[oldIngId];
      const newIng = ING_MAP[newIngId];
      if (!oldIng || !newIng) return prevSuggestion;
      return prevSuggestion; // placeholder, la logica vera è sotto
    });

    setNome(prevNome => {
      const oldIng = ING_MAP[oldIngId];
      const newIng = ING_MAP[newIngId];
      if (!oldIng || !newIng) return prevNome;

      // Base per il suggerimento: usa il suggerimento pendente se diverso dal nome corrente,
      // altrimenti parte dal nome corrente.
      // Poiché setSuggerisciNome è asincrono, leggiamo dall'esterno tramite ref-like trick:
      // usiamo direttamente suggerisciNome (catturato nella closure della chiamata a replaceIng)
      const baseTitle = suggerisciNome || prevNome;

      const oldTerms = [oldIng.nome, ...(oldIng.tags || [])].map(t => t.toLowerCase());
      const titleLower = baseTitle.toLowerCase();

      let matchedOriginal = null;
      for (const term of oldTerms) {
        const idx = titleLower.indexOf(term);
        if (idx !== -1) {
          matchedOriginal = baseTitle.slice(idx, idx + term.length);
          break;
        }
      }

      if (!matchedOriginal) {
        // Nessun termine del vecchio ingrediente nel titolo → mantieni il suggerimento esistente
        if (suggerisciNome && suggerisciNome !== prevNome) {
          // Non cambiare il suggerimento già in corso
        }
        return prevNome;
      }

      const newName = newIng.nome.toLowerCase().split("/")[0].trim();
      const suggested = baseTitle.replace(matchedOriginal, newName);

      if (suggested !== prevNome) {
        setSuggerisciNome(suggested);
      }
      return prevNome; // il titolo NON cambia automaticamente
    });
  };

  const addIng = ingId => {
    if (ings[ingId]) return; // già presente
    // Unità default sensata per categoria
    const ing = ING_MAP[ingId];
    const defaultUnit = ing?.tags?.includes("olio") ? "cucchiaio"
      : PESO_PEZZO[ingId] ? "pz" : "g";
    setIngs(prev => ({ ...prev, [ingId]: { valore: 100, unit: defaultUnit } }));
    setSearch("");
    setShowSearch(false);
  };

  // Ricerca ingredienti (aggiunta)
  const searchResults = React.useMemo(() => {
    if (!search.trim()) return [];
    const q = search.toLowerCase();
    return INGREDIENTS
      .filter(i => !ings[i.id] && (i.nome.toLowerCase().includes(q) || (i.tags||[]).some(t=>t.includes(q))))
      .slice(0, 8);
  }, [search, ings]);

  // Ricerca ingredienti (sostituzione)
  const replResults = React.useMemo(() => {
    if (!replSearch.trim()) return [];
    const q = replSearch.toLowerCase();
    const usedIds = new Set(Object.keys(ings));
    return INGREDIENTS
      .filter(i => !usedIds.has(i.id) && i.id !== replacing && (i.nome.toLowerCase().includes(q) || (i.tags||[]).some(t=>t.includes(q))))
      .slice(0, 8);
  }, [replSearch, replacing, ings]);

  const handleSave = () => {
    if (ingList.length === 0) return;
    // Crea oggetto ricetta custom compatibile con il DB
    const customId = "cust_" + Date.now();
    const customMacro = calcMacroEditor(ings);

    // Costruiamo porzioni come testo leggibile
    const porzioneStr = formattaPorzione(ings);

    // La ricetta custom deve avere tutti i campi di una ricetta standard
    const customRecipe = {
      id: customId,
      nome: nome.trim() || meal.nome,
      prep: meal.prep,
      baseId: meal.id,
      isCustom: true,
      // Macro fissi calcolati dagli ingredienti (non scalati)
      uomo: customMacro, donna: customMacro, bimbo: customMacro,
      porzioni: {
        uomo: porzioneStr, donna: porzioneStr, bimbo: porzioneStr
      },
      // Ingredienti salvati per la visualizzazione / ricalcolo
      _ingredienti: ings,
      // Campi opzionali
      ingredients: Object.keys(ings),
      tags: meal.tags || [],
      stagioni: meal.stagioni || null,
    };

    // Registra in ING_QTY runtime con flag _scaled: true per dire a
    // scalaPastiGiorno che queste quantità sono già ottimizzate e non
    // vanno riscalate di nuovo.
    const qtyEntry = { _scaled: true };
    for (const [ingId, q] of Object.entries(ings)) {
      qtyEntry[ingId] = { uomo: q.valore, donna: q.valore, bimbo: q.valore, unit: q.unit };
    }
    ING_QTY[customId] = qtyEntry;

    onSave(customRecipe);
  };

  const ingLabel = ingId => ING_MAP[ingId]?.nome || ingId;
  const ingCat   = ingId => ING_MAP[ingId]?.cat  || "Altro";

  // Raggruppa per categoria per la UI
  const grouped = {};
  for (const [ingId] of ingList) {
    const cat = ingCat(ingId);
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(ingId);
  }

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"#00000055"}}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px #0000003a"}}>

        {/* ── Header ── */}
        <div style={{padding:"16px 18px 12px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>
              ✏️ Modifica ricetta
            </div>
            <input
              value={nome}
              onChange={e=>setNome(e.target.value)}
              style={{fontSize:15,fontWeight:800,color:"#1e293b",border:"none",outline:"none",padding:0,background:"transparent",width:"100%",minWidth:0}}
              placeholder="Nome ricetta…"
            />
          </div>
          <button onClick={onClose}
            style={{width:32,height:32,borderRadius:"50%",border:"none",background:"#f1f5f9",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            ✕
          </button>
        </div>

        {/* ── Macro live ── */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,padding:"10px 18px",background:"#f8fafc",flexShrink:0,borderBottom:"1px solid #f1f5f9"}}>
          {[["kcal","#1e293b"],["P","#2563eb"],["C","#d97706"],["G","#16a34a"]].map(([lbl,col])=>(
            <div key={lbl} style={{textAlign:"center"}}>
              <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>{lbl}</div>
              <div style={{fontSize:16,fontWeight:800,color:col,fontFamily:"monospace",lineHeight:1.2}}>
                {lbl==="kcal"?macro.kcal:lbl==="P"?macro.p:lbl==="C"?macro.c:macro.g}
              </div>
              {lbl!=="kcal"&&<div style={{fontSize:8,color:"#94a3b8"}}>g</div>}
            </div>
          ))}
        </div>

        {/* ── Banner suggerimento titolo ── */}
        {suggerisciNome && (
          <div style={{background:"#fffbeb",borderBottom:"1px solid #fde68a",padding:"10px 18px",flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:13,flexShrink:0}}>💡</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:10,fontWeight:700,color:"#92400e",marginBottom:2}}>Aggiorna il titolo?</div>
              <div style={{fontSize:12,color:"#78350f",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {suggerisciNome}
              </div>
            </div>
            <button onClick={()=>{ setNome(suggerisciNome); setSuggerisciNome(null); }}
              style={{flexShrink:0,padding:"5px 10px",borderRadius:7,border:"none",background:"#d97706",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer"}}>
              Applica
            </button>
            <button onClick={()=>setSuggerisciNome(null)}
              style={{flexShrink:0,padding:"5px 8px",borderRadius:7,border:"1px solid #fde68a",background:"transparent",color:"#92400e",fontWeight:700,fontSize:11,cursor:"pointer"}}>
              Ignora
            </button>
          </div>
        )}

        {/* ── Lista ingredienti (scrollabile) ── */}
        <div style={{flex:1,overflowY:"auto",padding:"10px 18px"}}>
          {Object.entries(grouped).map(([cat, ids]) => (
            <div key={cat} style={{marginBottom:14}}>
              <div style={{fontSize:9,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>{cat}</div>
              {ids.map(ingId => {
                const q = ings[ingId];
                return (
                  <div key={ingId} style={{borderBottom:"1px solid #f1f5f9",paddingBottom:replacing===ingId?8:0}}>
                    {/* Riga principale */}
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0"}}>
                      {/* Nome */}
                      <div style={{flex:1,fontSize:12,fontWeight:600,color:replacing===ingId?"#7c3aed":"#334155",minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {ingLabel(ingId)}
                      </div>
                      {/* Quantità */}
                      <input
                        type="number" min="0" step={q.unit==="pz"||q.unit==="cucchiaio"||q.unit==="cucchiaino"?0.5:5}
                        value={q.valore}
                        onChange={e=>updateQty(ingId,"valore",e.target.value)}
                        style={{width:52,padding:"5px 6px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:13,fontWeight:700,fontFamily:"monospace",textAlign:"right",outline:"none"}}
                      />
                      {/* Unità */}
                      <select value={q.unit} onChange={e=>updateQty(ingId,"unit",e.target.value)}
                        style={{padding:"5px 2px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:11,fontWeight:600,outline:"none",background:"#fff",color:"#475569",maxWidth:72}}>
                        {UNIT_OPTIONS.map(u=><option key={u} value={u}>{u}</option>)}
                      </select>
                      {/* Sostituisci */}
                      <button
                        onClick={()=>{ setReplacing(replacing===ingId?null:ingId); setReplSearch(""); }}
                        title="Sostituisci con altro ingrediente (stesse kcal)"
                        style={{width:28,height:28,borderRadius:7,border:`1.5px solid ${replacing===ingId?"#7c3aed":"#e2e8f0"}`,background:replacing===ingId?"#f5f3ff":"#f8fafc",color:replacing===ingId?"#7c3aed":"#64748b",fontWeight:800,fontSize:12,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                        ⇄
                      </button>
                      {/* Rimuovi */}
                      <button onClick={()=>removeIng(ingId)}
                        style={{width:28,height:28,borderRadius:7,border:"1px solid #fecaca",background:"#fef2f2",color:"#ef4444",fontWeight:800,fontSize:13,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                        −
                      </button>
                    </div>

                    {/* Drawer sostituzione (inline, sotto la riga) */}
                    {replacing===ingId && (
                      <div style={{background:"#f5f3ff",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid #ddd6fe"}}>
                        <div style={{fontSize:10,fontWeight:800,color:"#7c3aed",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span>⇄ Sostituisci con… <span style={{fontWeight:500,color:"#a78bfa"}}>(stesse kcal: {Math.round(nutriPerGrammi(ingId, quantitaInGrammi(ingId, q.valore, q.unit)).kcal)} kcal)</span></span>
                          <button onClick={()=>{setReplacing(null);setReplSearch("");}} style={{background:"none",border:"none",cursor:"pointer",color:"#a78bfa",fontSize:14,padding:0}}>✕</button>
                        </div>
                        <input
                          autoFocus
                          value={replSearch}
                          onChange={e=>setReplSearch(e.target.value)}
                          placeholder="Cerca ingrediente sostituto…"
                          style={{width:"100%",padding:"8px 10px",border:"1.5px solid #c4b5fd",borderRadius:8,fontSize:12,outline:"none",boxSizing:"border-box",background:"#fff"}}
                        />
                        {replResults.length>0 && (
                          <div style={{marginTop:6,border:"1px solid #ddd6fe",borderRadius:8,overflow:"hidden",background:"#fff"}}>
                            {replResults.map(ing=>{
                              // Preview kcal del sostituto con quantità ricalcolata
                              const oldGrammi = quantitaInGrammi(ingId, q.valore, q.unit);
                              const oldKcal   = nutriPerGrammi(ingId, oldGrammi).kcal;
                              const newNutri  = (ING_MAP[ing.id]||{}).nutri;
                              const kcalPer100 = newNutri?newNutri.kcal:100;
                              const newG = kcalPer100>0 ? Math.round(oldKcal/(kcalPer100/100)) : 0;
                              const pesoPezzo = PESO_PEZZO[ing.id];
                              const qPreview  = pesoPezzo
                                ? `${Math.max(0.5,Math.round((newG/pesoPezzo)*2)/2)} pz`
                                : `${Math.max(5,newG)}g`;
                              return (
                                <div key={ing.id} onClick={()=>replaceIng(ingId,ing.id)}
                                  style={{padding:"9px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f5f3ff"}}
                                  onMouseEnter={e=>e.currentTarget.style.background="#faf5ff"}
                                  onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                                  <div>
                                    <div style={{fontSize:12,fontWeight:700,color:"#334155"}}>{ing.nome}</div>
                                    <div style={{fontSize:9,color:"#94a3b8"}}>{ing.cat}</div>
                                  </div>
                                  <div style={{textAlign:"right",flexShrink:0}}>
                                    <div style={{fontSize:11,fontWeight:800,color:"#7c3aed",fontFamily:"monospace"}}>{qPreview}</div>
                                    <div style={{fontSize:9,color:"#a78bfa"}}>≈ {Math.round(oldKcal)} kcal</div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                        {replSearch.trim()&&replResults.length===0&&(
                          <div style={{padding:"8px 10px",fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:4}}>Nessun ingrediente trovato</div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}

          {/* ── Aggiunta ingrediente ── */}
          <div style={{marginTop:8,marginBottom:6}}>
            {!showSearch ? (
              <button onClick={()=>setShowSearch(true)}
                style={{width:"100%",padding:"9px",borderRadius:9,border:"1.5px dashed #cbd5e1",background:"#f8fafc",color:"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                + Aggiungi ingrediente
              </button>
            ) : (
              <div>
                <div style={{position:"relative",marginBottom:6}}>
                  <input
                    autoFocus
                    value={search}
                    onChange={e=>setSearch(e.target.value)}
                    placeholder="Cerca ingrediente…"
                    style={{width:"100%",padding:"9px 12px",border:"1.5px solid #2563eb",borderRadius:9,fontSize:13,outline:"none",boxSizing:"border-box"}}
                  />
                  <button onClick={()=>{setShowSearch(false);setSearch("");}}
                    style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16}}>✕</button>
                </div>
                {searchResults.length>0 && (
                  <div style={{border:"1px solid #e2e8f0",borderRadius:9,overflow:"hidden"}}>
                    {searchResults.map(ing=>(
                      <div key={ing.id} onClick={()=>addIng(ing.id)}
                        style={{padding:"9px 12px",cursor:"pointer",fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f1f5f9",background:"#fff"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                        onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                        <span style={{fontWeight:600,color:"#334155"}}>{ing.nome}</span>
                        <span style={{fontSize:9,color:"#94a3b8"}}>{ing.cat}</span>
                      </div>
                    ))}
                  </div>
                )}
                {search.trim()&&searchResults.length===0&&(
                  <div style={{padding:"10px 12px",fontSize:12,color:"#94a3b8",textAlign:"center"}}>
                    Nessun ingrediente trovato
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* ── Footer: salva ── */}
        <div style={{padding:"12px 18px 20px",borderTop:"1px solid #f1f5f9",flexShrink:0,display:"flex",gap:10}}>
          <button onClick={onClose}
            style={{flex:1,padding:"12px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            Annulla
          </button>
          <button onClick={handleSave}
            style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",boxShadow:"0 4px 14px #2563eb33"}}>
            ✓ Salva ricetta personalizzata
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ConsumedEditorModal ────────────────────────────────────────────
// Permette di modificare ingredienti e quantità di un pasto già consumato.
// Non crea una ricetta custom: salva direttamente i macro nel mealsLog.
function ConsumedEditorModal({ meal, mealKey, personaKey, initialIngs, onSave, onClose }) {
  // initialIngs: { ingId: {valore, unit} } — può essere null/vuoto
  const baseIngs = React.useMemo(() => {
    if (initialIngs && Object.keys(initialIngs).length > 0) return { ...initialIngs };
    return ingQtyToEditor(meal.id, personaKey);
  }, []);

  const [ings, setIngs]           = React.useState(baseIngs);
  const [search, setSearch]       = React.useState("");
  const [showSearch, setShowSearch] = React.useState(false);

  const macro = React.useMemo(() => calcMacroEditor(ings), [ings]);

  const updateQty = (ingId, field, raw) => {
    const val = field === "unit" ? raw : Math.max(0, parseFloat(raw) || 0);
    setIngs(prev => ({ ...prev, [ingId]: { ...prev[ingId], [field]: val } }));
  };
  const removeIng = ingId => {
    setIngs(prev => { const n = {...prev}; delete n[ingId]; return n; });
  };
  const addIng = ingId => {
    if (ings[ingId]) return;
    const ing = ING_MAP[ingId];
    const defaultUnit = ing?.tags?.includes("olio") ? "cucchiaio" : PESO_PEZZO[ingId] ? "pz" : "g";
    setIngs(prev => ({ ...prev, [ingId]: { valore: 100, unit: defaultUnit } }));
    setSearch(""); setShowSearch(false);
  };

  const searchResults = React.useMemo(() => {
    if (!search.trim()) return [];
    const q = search.toLowerCase();
    return INGREDIENTS
      .filter(i => !ings[i.id] && (i.nome.toLowerCase().includes(q) || (i.tags||[]).some(t=>t.includes(q))))
      .slice(0, 8);
  }, [search, ings]);

  // Raggruppa per categoria
  const grouped = {};
  for (const ingId of Object.keys(ings)) {
    const cat = ING_MAP[ingId]?.cat || "Altro";
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(ingId);
  }

  const handleSave = () => {
    // Salva: macro calcolati dagli ingredienti reali + snapshot ingredienti
    onSave({ ...macro, _ingredienti: ings });
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"#00000055"}}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px #0000003a"}}>

        {/* Header */}
        <div style={{padding:"16px 18px 12px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{fontSize:11,color:"#16a34a",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>
              ✅ Cosa hai mangiato davvero?
            </div>
            <div style={{fontSize:14,fontWeight:800,color:"#1e293b"}}>{meal.nome}</div>
          </div>
          <button onClick={onClose}
            style={{width:32,height:32,borderRadius:"50%",border:"none",background:"#f1f5f9",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
        </div>

        {/* Macro live */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,padding:"10px 18px",background:"#f0fdf4",flexShrink:0,borderBottom:"1px solid #dcfce7"}}>
          {[["kcal","#1e293b"],["P","#2563eb"],["C","#d97706"],["G","#16a34a"]].map(([lbl,col])=>(
            <div key={lbl} style={{textAlign:"center"}}>
              <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>{lbl}</div>
              <div style={{fontSize:16,fontWeight:800,color:col,fontFamily:"monospace",lineHeight:1.2}}>
                {lbl==="kcal"?macro.kcal:lbl==="P"?macro.p:lbl==="C"?macro.c:macro.g}
              </div>
              {lbl!=="kcal"&&<div style={{fontSize:8,color:"#94a3b8"}}>g</div>}
            </div>
          ))}
        </div>

        {/* Lista ingredienti */}
        <div style={{flex:1,overflowY:"auto",padding:"10px 18px"}}>
          {Object.keys(ings).length === 0 && (
            <div style={{textAlign:"center",padding:"20px 0",color:"#94a3b8",fontSize:12}}>
              Nessun ingrediente — aggiungine uno qui sotto
            </div>
          )}
          {Object.entries(grouped).map(([cat, ids]) => (
            <div key={cat} style={{marginBottom:14}}>
              <div style={{fontSize:9,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>{cat}</div>
              {ids.map(ingId => {
                const q = ings[ingId];
                return (
                  <div key={ingId} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}>
                    <div style={{flex:1,fontSize:13,fontWeight:600,color:"#1e293b",minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {ING_MAP[ingId]?.nome || ingId}
                    </div>
                    <input type="number" min="0" step="1"
                      value={q.valore}
                      onChange={e=>updateQty(ingId,"valore",e.target.value)}
                      style={{width:60,padding:"4px 6px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:13,fontWeight:700,textAlign:"center",outline:"none",fontFamily:"monospace"}}
                    />
                    <select value={q.unit} onChange={e=>updateQty(ingId,"unit",e.target.value)}
                      style={{padding:"4px 2px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:11,background:"#f8fafc",outline:"none",color:"#334155"}}>
                      {UNIT_OPTIONS.map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                    <button onClick={()=>removeIng(ingId)}
                      style={{flexShrink:0,width:26,height:26,borderRadius:"50%",border:"none",background:"#fef2f2",color:"#ef4444",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>
                      ✕
                    </button>
                  </div>
                );
              })}
            </div>
          ))}

          {/* Aggiunta ingrediente */}
          <div style={{marginTop:8,marginBottom:6}}>
            {!showSearch ? (
              <button onClick={()=>setShowSearch(true)}
                style={{width:"100%",padding:"9px",borderRadius:9,border:"1.5px dashed #cbd5e1",background:"#f8fafc",color:"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                + Aggiungi ingrediente
              </button>
            ) : (
              <div>
                <div style={{position:"relative",marginBottom:6}}>
                  <input autoFocus value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="Cerca ingrediente…"
                    style={{width:"100%",padding:"9px 12px",border:"1.5px solid #16a34a",borderRadius:9,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                  <button onClick={()=>{setShowSearch(false);setSearch("");}}
                    style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16}}>✕</button>
                </div>
                {searchResults.length>0 && (
                  <div style={{border:"1px solid #e2e8f0",borderRadius:9,overflow:"hidden"}}>
                    {searchResults.map(ing=>(
                      <div key={ing.id} onClick={()=>addIng(ing.id)}
                        style={{padding:"9px 12px",cursor:"pointer",fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f1f5f9",background:"#fff"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                        onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                        <span style={{fontWeight:600,color:"#334155"}}>{ing.nome}</span>
                        <span style={{fontSize:9,color:"#94a3b8"}}>{ing.cat}</span>
                      </div>
                    ))}
                  </div>
                )}
                {search.trim()&&searchResults.length===0&&(
                  <div style={{padding:"10px 12px",fontSize:12,color:"#94a3b8",textAlign:"center"}}>Nessun ingrediente trovato</div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:"12px 18px 20px",borderTop:"1px solid #f1f5f9",flexShrink:0,display:"flex",gap:10}}>
          <button onClick={onClose}
            style={{flex:1,padding:"12px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            Annulla
          </button>
          <button onClick={handleSave}
            style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",boxShadow:"0 4px 14px #16a34a33"}}>
            ✅ Aggiorna calorie consumate
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MealCard ────────────────────────────────────────────────────────
// ─── WaterTracker ─────────────────────────────────────────────────
const WATER_ML   = 200;   // ml per bicchiere
const WATER_GOAL = 2000;  // ml target giornaliero
const WATER_MAX  = 14;    // bicchieri massimi visualizzati (2800ml)

function WaterTracker({ dayKey, personaColor }) {
  // glasses: numero bicchieri bevuti per questo giorno
  const [glasses, setGlasses] = useState(0);
  const [loaded,  setLoaded]  = useState(false);
  const [bounce,  setBounce]  = useState(null); // indice bicchiere animato

  // Chiave storage per questo giorno
  const storageKey = `${SK_WATER}:${dayKey}`;

  useEffect(() => {
    window.storage.get(storageKey)
      .then(r => setGlasses(Math.min(WATER_MAX, parseInt(r.value) || 0)))
      .catch(() => setGlasses(0))
      .finally(() => setLoaded(true));
  }, [storageKey]);

  const setAndSave = async (n) => {
    const clamped = Math.max(0, Math.min(WATER_MAX, n));
    setGlasses(clamped);
    await window.storage.set(storageKey, String(clamped)).catch(() => {});
  };

  const handleGlassClick = (idx) => {
    // Se clicco il bicchiere già pieno più alto → rimuovi (deseleziona)
    // Se clicco un bicchiere → porta il contatore a idx+1
    const next = idx + 1 === glasses ? idx : idx + 1;
    setBounce(idx);
    setTimeout(() => setBounce(null), 300);
    setAndSave(next);
  };

  const ml       = glasses * WATER_ML;
  const pct      = Math.min(100, Math.round((ml / WATER_GOAL) * 100));
  const goal_ok  = ml >= WATER_GOAL;
  const color    = goal_ok ? "#16a34a" : ml >= 1400 ? "#0891b2" : ml >= 800 ? "#d97706" : "#94a3b8";
  const bgBar    = goal_ok ? "#f0fdf4" : ml >= 1400 ? "#f0f9ff" : ml >= 800 ? "#fffbeb" : "#f8fafc";
  const label    = goal_ok ? "🎉 Obiettivo raggiunto!" : `${WATER_GOAL - ml} ml al traguardo`;

  if (!loaded) return null;

  return (
    <div style={{background:"#fff",borderRadius:12,border:`1.5px solid ${goal_ok?"#bbf7d0":"#e2e8f0"}`,padding:"14px 16px",marginTop:10,transition:"border-color 0.3s"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:18}}>💧</span>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:"#1e293b"}}>Idratazione</div>
            <div style={{fontSize:10,color:"#64748b"}}>Obiettivo: {WATER_GOAL/1000}L · {WATER_ML}ml per bicchiere</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:18,fontWeight:800,color,fontFamily:"monospace"}}>{(ml/1000).toFixed(1)}<span style={{fontSize:11,fontWeight:400,color:"#94a3b8"}}> L</span></div>
          <div style={{fontSize:9,color,fontWeight:700}}>{label}</div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{background:"#f1f5f9",borderRadius:99,height:8,overflow:"hidden",marginBottom:12}}>
        <div style={{
          width:`${pct}%`, height:"100%", borderRadius:99,
          background: goal_ok
            ? "linear-gradient(90deg,#16a34a,#22c55e)"
            : ml>=1400 ? "linear-gradient(90deg,#0891b2,#38bdf8)"
            : ml>=800  ? "linear-gradient(90deg,#d97706,#fbbf24)"
            : "#cbd5e1",
          transition:"width 0.4s cubic-bezier(.4,0,.2,1)"
        }}/>
      </div>

      {/* Griglia bicchieri */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {Array.from({length: WATER_MAX}).map((_, i) => {
          const filled  = i < glasses;
          const isNext  = i === glasses; // il prossimo da riempire
          const anim    = bounce === i;
          return (
            <button
              key={i}
              onClick={() => handleGlassClick(i)}
              style={{
                width:36, height:44,
                borderRadius:8,
                border:`2px solid ${filled ? color+"80" : "#e2e8f0"}`,
                background: filled ? bgBar : "#f8fafc",
                cursor:"pointer",
                display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center",
                gap:1,
                transform: anim ? "scale(1.25)" : isNext ? "scale(1.05)" : "scale(1)",
                transition:"transform 0.15s, background 0.2s, border-color 0.2s",
                outline:"none",
                padding:0,
              }}
            >
              <span style={{fontSize:18,lineHeight:1,filter:filled?"none":"grayscale(1) opacity(0.35)"}}>
                🥛
              </span>
              <span style={{fontSize:7,fontFamily:"monospace",fontWeight:700,color:filled?color:"#cbd5e1"}}>
                {WATER_ML}
              </span>
            </button>
          );
        })}
      </div>

      {/* Hint */}
      <div style={{marginTop:8,fontSize:10,color:"#94a3b8",textAlign:"center"}}>
        Tocca un bicchiere per segnarlo · toccalo di nuovo per rimuoverlo
      </div>
    </div>
  );
}

// Soglie tempo per i pulsanti del selettore
const PREP_SLOTS = [
  { label:"≤10'",  max:10,  color:"#16a34a", bg:"#f0fdf4" },
  { label:"≤20'",  max:20,  color:"#0891b2", bg:"#f0f9ff" },
  { label:"≤30'",  max:30,  color:"#d97706", bg:"#fffbeb" },
  { label:"≤60'",  max:60,  color:"#dc2626", bg:"#fef2f2" },
];

function MealCard({ mealKey, dayIdx, meal, personaKey, color, onSwap, weekMealIds, excludedIds, isOverride, onReset, prefEntry, onToggleLike, macroOverride, quantitaOverride, consumed, onToggleConsumed, onEdit, loggedMacros, loggedIngs, onEditConsumed }) {
  const [open, setOpen]               = useState(false);
  const [swapOpen, setSwapOpen]       = useState(false);

  const [maxPrep, setMaxPrep]         = useState(null);

  // Se consumato e abbiamo macro reali dal log, mostriamo quelle; altrimenti le macro del piano
  const m = (consumed && loggedMacros) ? loggedMacros : (macroOverride || meal[personaKey]);
  const { label, isSnack } = MEAL_META[mealKey];

  const prep = meal.prep;
  const prepColor = !prep ? "#94a3b8" : prep <= 15 ? "#16a34a" : prep <= 30 ? "#d97706" : "#dc2626";
  const prepBg    = !prep ? "#f8fafc"  : prep <= 15 ? "#f0fdf4" : prep <= 30 ? "#fffbeb" : "#fef2f2";
  const prepLabel = !prep ? null : prep >= 60 ? `${prep/60}h` : `${prep}'`;

  // Alternative calcolate al volo quando l'utente sceglie un filtro tempo
  const alternatives = maxPrep !== null
    ? findAlternatives(mealKey, meal, maxPrep, excludedIds || [], weekMealIds || new Set(), personaKey)
    : [];

  return (
    <div style={{background:isSnack?"#fafafa":"#fff",borderRadius:12,border:`1.5px solid ${isOverride?"#7c3aed40":isSnack?"#f1f5f9":"#e2e8f0"}`,marginBottom:8,overflow:"hidden",boxShadow:isSnack?"none":isOverride?"0 2px 12px #7c3aed18":"0 2px 10px #0000000a"}}>

      {/* ── Header pasto ── */}
      <div onClick={()=>{ setOpen(o=>!o); if(swapOpen) setSwapOpen(false); }}
        style={{background:consumed?"#f0fdf4":isSnack?"transparent":isOverride?`#7c3aed0e`:color+"0e",borderBottom:(open||swapOpen)?`1px solid ${isOverride?"#7c3aed20":color+"20"}`:"none",padding:"9px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",userSelect:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontWeight:800,fontSize:isSnack?11:13,color:isSnack?"#94a3b8":isOverride?"#7c3aed":color}}>{label}</span>
          {isOverride && <span style={{fontSize:9,background:"#7c3aed",color:"#fff",borderRadius:4,padding:"1px 5px",fontWeight:800}}>MOD</span>}
          {consumed && loggedMacros && <span style={{fontSize:9,background:"#16a34a",color:"#fff",borderRadius:4,padding:"1px 5px",fontWeight:800}}>✓ reale</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {prepLabel && (
            <span style={{fontSize:10,fontWeight:700,color:prepColor,background:prepBg,borderRadius:5,padding:"2px 6px"}}>
              ⏱ {prepLabel}
            </span>
          )}
          <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:consumed&&loggedMacros?"#16a34a":"#1e293b"}}>{m.kcal} kcal</span>
          <span style={{color:"#cbd5e1",fontSize:10}}>{open?"▲":"▼"}</span>
        </div>
      </div>

      {/* ── Corpo principale ── */}
      <div style={{padding:"10px 14px"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:8}}>
          <div style={{fontSize:isSnack?12:13,fontWeight:600,color:"#1e293b",lineHeight:1.4,flex:1}}>{meal.nome}</div>
          <div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {/* Bottone like */}
            <button
              onClick={e=>{ e.stopPropagation(); onToggleLike && onToggleLike(); }}
              aria-label={prefEntry?.liked ? "Rimuovi preferito" : "Segna come preferito"}
              title={prefEntry?.liked ? "Tolta dai preferiti" : "Aggiungi ai preferiti"}
              style={{flexShrink:0,width:31,height:28,borderRadius:7,border:`1.5px solid ${prefEntry?.liked?"#ef4444":"#e2e8f0"}`,background:prefEntry?.liked?"#fef2f2":"#f8fafc",cursor:"pointer",transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,padding:0}}>
              <span style={{filter:prefEntry?.liked?"none":"grayscale(1) opacity(0.55)"}}>{prefEntry?.liked?"❤️":"🤍"}</span>
            </button>
            {/* Bottone consumato */}
            <button onClick={e=>{ e.stopPropagation(); onToggleConsumed&&onToggleConsumed(); }} title={consumed?"Segna come non consumato":"Segna come consumato"}
              style={{flexShrink:0,width:31,height:28,borderRadius:7,border:`1.5px solid ${consumed?"#16a34a":"#e2e8f0"}`,background:consumed?"#f0fdf4":"#f8fafc",cursor:"pointer",transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,padding:0}}>
              <span style={{filter:consumed?"none":"grayscale(1) opacity(0.4)"}}>{consumed?"✅":"☑️"}</span>
            </button>
            {/* Bottone modifica calorie consumate — visibile solo se consumato */}
            {consumed && (
              <button
                onClick={e=>{ e.stopPropagation(); setConsumedEditOpen(true); setOpen(false); setSwapOpen(false); }}
                title="Modifica cosa hai mangiato davvero"
                style={{flexShrink:0,padding:"5px 8px",borderRadius:7,border:"1.5px solid #16a34a",background:"#f0fdf4",color:"#16a34a",fontWeight:700,fontSize:11,cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:3}}>
                ✏️ <span style={{fontSize:10}}>mangiato</span>
              </button>
            )}
            {/* Bottone modifica ricetta (solo se NON consumato) */}
            {!consumed && (
              <button
                onClick={e=>{ e.stopPropagation(); setEditOpen(true); setOpen(false); setSwapOpen(false); }}
                title="Modifica ingredienti e quantità"
                style={{flexShrink:0,width:31,height:28,borderRadius:7,border:"1.5px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,padding:0,color:"#64748b",fontWeight:700}}>
                ✏️
              </button>
            )}
            {/* Bottone swap (solo se NON consumato) */}
            {!consumed && (
              <button
                onClick={e=>{ e.stopPropagation(); setSwapOpen(s=>!s); setOpen(false); if(!swapOpen) setMaxPrep(null); }}
                style={{flexShrink:0,padding:"5px 10px",borderRadius:7,border:`1.5px solid ${swapOpen?"#7c3aed":"#e2e8f0"}`,background:swapOpen?"#7c3aed":"#f8fafc",color:swapOpen?"#fff":"#64748b",fontWeight:700,fontSize:11,cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap"}}>
                {swapOpen?"✕":"⇄ Cambia"}
              </button>
            )}
          </div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          <MacroBadge label="P" value={m.p} color="#2563eb"/>
          <MacroBadge label="C" value={m.c} color="#d97706"/>
          <MacroBadge label="G" value={m.g} color="#16a34a"/>
        </div>

        {/* Porzione reale (se consumato con ingredienti personalizzati) */}
        {consumed && loggedIngs && open && (
          <div style={{marginTop:10,background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#166534",lineHeight:1.6}}>
            <span style={{fontWeight:700,color:"#16a34a",fontSize:10,textTransform:"uppercase",letterSpacing:0.8}}>✅ Mangiato davvero · </span>
            {formattaPorzione(loggedIngs)}
          </div>
        )}

        {/* Porzione pianificata (espansa) — se non consumato o senza dati reali */}
        {open && !loggedIngs && (quantitaOverride || meal.porzioni?.[personaKey]) && (
          <div style={{marginTop:10,background:color+"08",border:`1px solid ${color}20`,borderRadius:8,padding:"8px 12px",fontSize:12,color:"#334155",lineHeight:1.6}}>
            <span style={{fontWeight:700,color,fontSize:10,textTransform:"uppercase",letterSpacing:0.8}}>
              📏 Porzione{quantitaOverride ? " personalizzata" : ""} · </span>
            {quantitaOverride ? formattaPorzione(quantitaOverride) : meal.porzioni[personaKey]}
          </div>
        )}

        {/* Reset override */}
        {isOverride && !swapOpen && (
          <button onClick={e=>{ e.stopPropagation(); onReset(); }}
            style={{marginTop:8,width:"100%",padding:"6px",borderRadius:7,border:"1px solid #7c3aed30",background:"#f5f3ff",color:"#7c3aed",fontSize:11,fontWeight:700,cursor:"pointer"}}>
            ↩ Ripristina originale
          </button>
        )}
      </div>

      {/* ── Modal modifica ricetta ── */}
      {editOpen && (
        <RecipeEditorModal
          meal={meal}
          mealKey={mealKey}
          personaKey={personaKey}
          quantitaScalate={quantitaOverride || null}
          onSave={customRecipe => {
            setEditOpen(false);
            onEdit && onEdit(customRecipe);
          }}
          onClose={() => setEditOpen(false)}
        />
      )}

      {/* ── Modal modifica pasto consumato ── */}
      {consumedEditOpen && (
        <ConsumedEditorModal
          meal={meal}
          mealKey={mealKey}
          personaKey={personaKey}
          initialIngs={loggedIngs || null}
          onSave={data => {
            setConsumedEditOpen(false);
            onEditConsumed && onEditConsumed(data);
          }}
          onClose={() => setConsumedEditOpen(false)}
        />
      )}

      {/* ── Drawer sostituzione ── */}
      {swapOpen && (
        <div style={{borderTop:"1px solid #e2e8f0",background:"#fafafa",padding:"12px 14px"}}>
          {/* Come verrà interpretato questo swap */}
          {(()=>{
            const tipo = classifySwap(dayIdx, mealKey);
            const isContesto = tipo === "contesto";
            return (
              <div style={{display:"flex",alignItems:"flex-start",gap:7,background:isContesto?"#fffbeb":"#f5f3ff",border:`1px solid ${isContesto?"#fde68a":"#ddd6fe"}`,borderRadius:8,padding:"8px 11px",marginBottom:12,fontSize:10.5,lineHeight:1.5,color:isContesto?"#92400e":"#6d28d9"}}>
                <span style={{fontSize:13,flexShrink:0}}>{isContesto?"⏱":"🔄"}</span>
                <span>
                  {isContesto
                    ? <>Pasto imminente: questo cambio conta come <strong>fretta</strong>, non penalizza i gusti della ricetta.</>
                    : <>Cambio pianificato in anticipo: conta come <strong>preferenza di gusto</strong>.</>}
                </span>
              </div>
            );
          })()}
          {/* Selettore tempo */}
          <div style={{fontSize:10,fontWeight:800,color:"#1e293b",marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>
            ⏱ Quanto tempo hai?
          </div>
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {PREP_SLOTS.map(s=>(
              <button key={s.max} onClick={()=>setMaxPrep(maxPrep===s.max?null:s.max)}
                style={{padding:"6px 12px",borderRadius:8,border:`2px solid ${maxPrep===s.max?s.color:"#e2e8f0"}`,background:maxPrep===s.max?s.bg:"#fff",color:maxPrep===s.max?s.color:"#64748b",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.15s"}}>
                {s.label}
              </button>
            ))}
          </div>

          {/* Risultati */}
          {maxPrep === null ? (
            <div style={{textAlign:"center",padding:"12px 0",color:"#94a3b8",fontSize:12}}>
              Seleziona il tempo disponibile per vedere le alternative
            </div>
          ) : alternatives.length === 0 ? (
            <div style={{textAlign:"center",padding:"12px 0",color:"#94a3b8",fontSize:12}}>
              Nessuna ricetta disponibile in {maxPrep} minuti 😔<br/>
              <span style={{fontSize:11}}>Prova ad aumentare il tempo o riabilita qualche ingrediente</span>
            </div>
          ) : (
            <div>
              <div style={{fontSize:10,color:"#64748b",marginBottom:8,fontWeight:600}}>
                {alternatives.length} alternative trovate · ordinate per calorie simili
              </div>
              {alternatives.map(alt=>{
                const altM = alt[personaKey];
                const altPrep = alt.prep || 0;
                const altPrepColor = altPrep<=15?"#16a34a":altPrep<=30?"#d97706":"#dc2626";
                const kcalDiff = altM?.kcal - m.kcal;
                const diffColor = Math.abs(kcalDiff)<=50?"#16a34a":Math.abs(kcalDiff)<=100?"#d97706":"#94a3b8";
                return (
                  <div key={alt.id} onClick={()=>{ onSwap(alt); setSwapOpen(false); setMaxPrep(null); }}
                    style={{background:"#fff",borderRadius:10,border:"1.5px solid #e2e8f0",padding:"10px 12px",marginBottom:7,cursor:"pointer",transition:"border-color 0.15s",display:"flex",alignItems:"center",gap:10}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="#7c3aed80"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="#e2e8f0"}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#1e293b",lineHeight:1.3,marginBottom:5}}>{alt.nome}</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontSize:10,fontWeight:700,color:altPrepColor,background:altPrepColor+"18",borderRadius:5,padding:"1px 6px"}}>⏱ {altPrep}'</span>
                        <span style={{fontSize:10,fontFamily:"monospace",fontWeight:700,color:"#1e293b"}}>{altM?.kcal} kcal</span>
                        <span style={{fontSize:10,fontWeight:700,color:diffColor}}>
                          {kcalDiff===0?"=":`${kcalDiff>0?"+":""}${kcalDiff} kcal`}
                        </span>
                        {alt._inWeek && <span style={{fontSize:9,color:"#f97316",background:"#fff7ed",borderRadius:4,padding:"1px 5px",fontWeight:700}}>già in sett.</span>}
                      </div>
                    </div>
                    <div style={{flexShrink:0,width:28,height:28,borderRadius:"50%",background:"#7c3aed10",border:"1.5px solid #7c3aed30",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>→</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TotaleBar({ dayData, personaKey, color, target, macroPerPasto }) {
  // macroPerPasto: se presente (persona con misure), contiene i macro
  // riscalati per ogni mealKey; altrimenti si usa la taglia fissa.
  const tot = MEAL_KEYS.reduce((a,mk)=>{
    const m = (macroPerPasto && macroPerPasto[mk]) || dayData[mk][personaKey];
    return {kcal:a.kcal+m.kcal,p:a.p+m.p,c:a.c+m.c,g:a.g+m.g};
  },{kcal:0,p:0,c:0,g:0});
  const t = target||{kcal:2000,p:150,c:200,g:65};
  return (

// ─── Seme composito: base seed + overrides serializzati ──────────────
// Formato: "SEED:123456789" oppure "SEED:123456789|OV:base64(json)"
function encodeSeed(seed, overrides) {
  const hasOverrides = overrides && Object.keys(overrides).length > 0;
  if (!hasOverrides) return String(seed);
  try {
    const ovStr = btoa(unescape(encodeURIComponent(JSON.stringify(overrides))));
    return `${seed}|OV:${ovStr}`;
  } catch { return String(seed); }
}

function decodeSeed(raw) {
  const s = raw.trim();
  if (!s.includes("|OV:")) {
    const n = parseInt(s, 10);
    return isNaN(n) || n <= 0 ? null : { seed: n, overrides: {} };
  }
  try {
    const [seedPart, ovPart] = s.split("|OV:");
    const seed = parseInt(seedPart, 10);
    if (isNaN(seed) || seed <= 0) return null;
    const overrides = JSON.parse(decodeURIComponent(escape(atob(ovPart))));
    return { seed, overrides };
  } catch { return null; }
}

// ─── SeedSyncSection ─────────────────────────────────────────────────
function SeedSyncSection({ currentSeed, overrides, onApplySeed }) {
  const [inputSeed, setInputSeed] = useState("");
  const [copied, setCopied]       = useState(false);
  const [applied, setApplied]     = useState(false);
  const [error, setError]         = useState("");

  const hasOverrides   = overrides && Object.keys(overrides).length > 0;
  const nOverrides     = hasOverrides ? Object.keys(overrides).length : 0;
  const composite      = encodeSeed(currentSeed, overrides);

  const handleCopy = () => {
    const text = composite;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
    } else {
      const el=document.createElement("textarea"); el.value=text; document.body.appendChild(el); el.select(); document.execCommand("copy"); document.body.removeChild(el);
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }
  };

  const handleApply = () => {
    const decoded = decodeSeed(inputSeed);
    if (!decoded) { setError("Seme non valido."); return; }
    setError("");
    onApplySeed(decoded.seed, decoded.overrides);
    setInputSeed(""); setApplied(true); setTimeout(()=>setApplied(false),2500);
  };

  return (
    <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e2e8f0",padding:"16px",marginBottom:16,boxShadow:"0 2px 10px #0000000a"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <span style={{fontSize:20}}>🔗</span>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:"#1e293b"}}>Sincronizzazione piano</div>
          <div style={{fontSize:10,color:"#64748b",marginTop:1}}>Condividi il seme per avere lo stesso piano su tutti i dispositivi</div>
        </div>
      </div>

      {/* Seme attivo */}
      <div style={{background:"#f8fafc",borderRadius:10,border:"1.5px solid #e2e8f0",padding:"12px 14px",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:0.8}}>🌱 Seme attivo</div>
          {hasOverrides && (
            <div style={{fontSize:10,fontWeight:700,color:"#7c3aed",background:"#f5f3ff",borderRadius:5,padding:"2px 8px",border:"1px solid #ddd6fe"}}>
              {nOverrides} pasto{nOverrides>1?"i":""} modificato{nOverrides>1?"i":""}
            </div>
          )}

      </div>
    </div>
  );
}

function scheduleNotifications(notifSettings, todayPlan, personas, myPersonaId) {
  if (!notifSettings||!notifSettings.enabled){navigator.serviceWorker?.controller?.postMessage({type:"CANCEL_NOTIFICATIONS"});return;}
  if (!("Notification" in window)||Notification.permission!=="granted") return;
  const now=new Date();
  const meals=MEAL_KEYS.map(mk=>{const cfg=notifSettings.meals[mk];if(!cfg||!cfg.active)return null;const fireTime=new Date();fireTime.setHours(cfg.hour,cfg.minute,0,0);const meal=todayPlan&&todayPlan[mk];return{mealKey:mk,label:MEAL_META[mk]?.label||mk,ricetta:meal?meal.nome:"È il momento di mangiare!",delayMs:fireTime.getTime()-now.getTime()};}).filter(Boolean);
  navigator.serviceWorker?.controller?.postMessage({type:"SCHEDULE_NOTIFICATIONS",meals});
}

function OpzioniPage({ notifSettings, onNotifChange, plan, personas, myPersonaId }) {

  const todayPlan = plan ? plan[todayDayIndex()] : null;
  const requestPermission = async () => {
    if (!("Notification" in window)) return; setRequesting(true);
    try { const result=await Notification.requestPermission(); setPermStatus(result); if(result==="granted"){const next={...settings,enabled:true};onNotifChange(next);scheduleNotifications(next,todayPlan,personas,myPersonaId);} } finally{setRequesting(false);}
  };
  const toggleEnabled=()=>{const next={...settings,enabled:!settings.enabled};onNotifChange(next);scheduleNotifications(next,todayPlan,personas,myPersonaId);};
  const toggleMeal=mk=>{const next={...settings,meals:{...settings.meals,[mk]:{...settings.meals[mk],active:!settings.meals[mk].active}}};onNotifChange(next);if(settings.enabled&&permStatus==="granted")scheduleNotifications(next,todayPlan,personas,myPersonaId);};
  const setMealTime=(mk,field,val)=>{const next={...settings,meals:{...settings.meals,[mk]:{...settings.meals[mk],[field]:parseInt(val)||0}}};onNotifChange(next);if(settings.enabled&&permStatus==="granted")scheduleNotifications(next,todayPlan,personas,myPersonaId);};
  const isGranted=permStatus==="granted",isDenied=permStatus==="denied";

        {isDenied&&<div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:9,padding:"10px 14px",fontSize:11,color:"#c2410c",lineHeight:1.6}}>🚫 Notifiche bloccate. Vai nelle impostazioni del browser per abilitarle.</div>}
        {permStatus==="default"&&<button onClick={requestPermission} disabled={requesting} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",boxShadow:"0 4px 14px #2563eb44"}}>{requesting?"⏳ Richiesta…":"🔔 Abilita notifiche"}</button>}
        {isGranted&&<div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:12,color:"#475569",fontWeight:600,flex:1}}>Notifiche attive</span><div onClick={toggleEnabled} style={{position:"relative",width:44,height:24,borderRadius:12,background:settings.enabled?"#2563eb":"#cbd5e1",cursor:"pointer",transition:"background 0.2s",flexShrink:0}}><div style={{position:"absolute",top:3,left:settings.enabled?22:2,width:18,height:18,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 3px #0003",transition:"left 0.2s"}}/></div><span style={{fontSize:11,color:settings.enabled?"#2563eb":"#94a3b8",fontWeight:700}}>{settings.enabled?"ON":"OFF"}</span></div>}
      </div>

        <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>Personalizza l'orario per ogni pasto.</div>
        {MEAL_KEYS.map((mk,i)=>{const cfg=settings.meals[mk];const meta=MEAL_META[mk];const todayMeal=todayPlan&&todayPlan[mk];return(<div key={mk} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 0",borderBottom:i<MEAL_KEYS.length-1?"1px solid #f1f5f9":"none"}}><div onClick={()=>toggleMeal(mk)} style={{position:"relative",width:36,height:20,borderRadius:10,background:cfg.active?"#2563eb":"#e2e8f0",cursor:"pointer",transition:"background 0.2s",flexShrink:0}}><div style={{position:"absolute",top:2,left:cfg.active?17:2,width:16,height:16,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 3px #0003",transition:"left 0.2s"}}/></div><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:700,color:cfg.active?"#1e293b":"#94a3b8"}}>{MICONS[mk]} {meta.label.split(" ").slice(1).join(" ")}</div>{todayMeal&&cfg.active&&<div style={{fontSize:10,color:"#64748b",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Oggi: {todayMeal.nome}</div>}</div><div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><input type="number" min="0" max="23" value={cfg.hour} onChange={e=>setMealTime(mk,"hour",e.target.value)} style={{width:38,padding:"5px 4px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:14,fontFamily:"monospace",fontWeight:700,textAlign:"center",outline:"none",color:cfg.active?"#1e293b":"#94a3b8"}}/><span style={{fontWeight:800,color:"#94a3b8"}}>:</span><input type="number" min="0" max="59" value={cfg.minute} onChange={e=>setMealTime(mk,"minute",e.target.value)} style={{width:38,padding:"5px 4px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:14,fontFamily:"monospace",fontWeight:700,textAlign:"center",outline:"none",color:cfg.active?"#1e293b":"#94a3b8"}}/></div></div>);})}
